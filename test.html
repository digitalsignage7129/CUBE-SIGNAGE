<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>WBGT実機テスト（画像表示修正版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex; justify-content: flex-start; align-items: flex-start;
        }

        /* 🎯 640x128 絶対固定（絶対に縮ませない・折り返させないガード） */
        .signage-container {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important; /* 絶対に下段に折り返さない */
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            min-height: 128px !important;
            max-height: 128px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 128px正方形ブロック（ここも突っ張る） */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important; 
            height: 128px !important;
            min-width: 128px !important;
            max-width: 128px !important;
            border-right: 1px solid #1a1a1a;
            display: flex; flex-direction: column; justify-content: space-between; 
            padding: 5px 2px; text-align: center;
            background-color: #000000; color: #FFFFFF;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            transition: background-color 0.3s ease;
        }
        .block:last-child { border-right: none; }

        .label { font-size: 10px; font-weight: bold; color: #666; line-height: 1.0; }
        .text-dark { color: #111111 !important; }

        /* 顔アイコン */
        .avatar-box {
            width: 100%; height: 44px;
            display: flex; align-items: center; justify-content: center;
        }
        .circle-window {
            width: 44px; height: 44px; border-radius: 50%;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: contain; }

        /* 数値 */
        .value-container { display: flex; align-items: baseline; justify-content: center; line-height: 1.0; }
        .value { font-size: 32px; font-family: 'Arial Black', sans-serif; font-weight: bold; line-height: 1.0; }
        .unit { font-size: 12px; margin-left: 1px; }

        /* 下段エリア */
        .bottom-row {
            display: flex; justify-content: space-between; align-items: center;
            width: 96%; margin: 0 auto; background-color: rgba(0, 0, 0, 0.4);
            padding: 1px 4px; border-radius: 2px; height: 18px;
        }
        .bottom-dark { background-color: rgba(255, 255, 255, 0.4) !important; }
        .status-text { font-size: 11px; font-weight: 900; line-height: 1.0; }
        .time-stamp { font-size: 9px; font-family: monospace; line-height: 1.0; }
    </style>
</head>
<body>
    <div class="signage-container">
        <div class="block data-block">
            <div class="label data-label">暑さ指数</div>
            <div class="avatar-box"><div class="circle-window"><img src="5.png" id="img-wbgt" class="avatar-img"></div></div>
            <div class="value-container"><span class="value" id="val-wbgt">21.5</span><span class="unit">℃</span></div>
            <div class="bottom-row" id="bottom-wbgt"><span class="status-text" id="status-wbgt">ほぼ安全</span><span class="time-stamp data-time">00:00:00</span></div>
        </div>
        <div class="block data-block">
            <div class="label data-label">気温</div>
            <div class="avatar-box"><div class="circle-window"><img src="5.png" id="img-kion" class="avatar-img"></div></div>
            <div class="value-container"><span class="value" id="val-kion">23.0</span><span class="unit">℃</span></div>
            <div class="bottom-row" id="bottom-kion"><span class="status-text" id="status-kion">ほぼ安全</span><span class="time-stamp data-time">00:00:00</span></div>
        </div>
        <div class="block data-block">
            <div class="label data-label">黒球温度</div>
            <div class="avatar-box"><div class="circle-window"><img src="5.png" id="img-koku" class="avatar-img"></div></div>
            <div class="value-container"><span class="value" id="val-koku">22.1</span><span class="unit">℃</span></div>
            <div class="bottom-row" id="bottom-koku"><span class="status-text" id="status-koku">ほぼ安全</span><span class="time-stamp data-time">00:00:00</span></div>
        </div>
        <div class="block data-block">
            <div class="label data-label">湿度</div>
            <div class="avatar-box"><div class="circle-window"><img src="5.png" id="img-shitu" class="avatar-img"></div></div>
            <div class="value-container"><span class="value" id="val-shitu">55.0</span><span class="unit">%</span></div>
            <div class="bottom-row" id="bottom-shitu"><span class="status-text" id="status-shitu">ほぼ安全</span><span class="time-stamp data-time">00:00:00</span></div>
        </div>
        <div class="block" style="background:#000; padding:0; display:flex; align-items:center; justify-content:center;">
            <img src="logo.png" style="width:100%; height:100%; object-fit:contain;">
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            document.querySelectorAll('.data-time').forEach(el => el.textContent = timeString);
        }
        setInterval(updateClock, 1000);
