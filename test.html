<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>WBGT実機テスト（文字サイズ・バランス最適化版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex; justify-content: flex-start; align-items: flex-start;
        }

        /* 640x128 絶対固定（下段折り返しガード） */
        .signage-container {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            min-height: 128px !important;
            max-height: 128px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 128px正方形ブロック（縦の配置バランスを再計算） */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important; 
            height: 128px !important;
            min-width: 128px !important;
            max-width: 128px !important;
            border-right: 1px solid #1a1a1a;
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 5px 2px 3px 2px;
            text-align: center;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: transparent; 
            transition: background-color 0.2s ease;
        }
        .block:last-child { border-right: none; }

        /* [1段目] 項目名：ご指定の「暑さ指数(WBGT値)」に対応（はみ出し防止で少し小さめ） */
        .label { font-size: 9px; font-weight: bold; line-height: 1.0; white-space: nowrap; }
        .text-dark { color: #111111 !important; }

        /* [2段目] 数値：限界まで大きく目立たせる（34px → 40pxに拡大！） */
        .value-container { 
            display: flex; 
            align-items: baseline; 
            justify-content: center; 
            line-height: 0.8; 
            margin: 2px 0; /* 位置を中央に調整 */
        }
        .value { font-size: 40px; font-family: 'Arial Black', sans-serif; font-weight: bold; }
        .unit { font-size: 13px; margin-left: 1px; font-weight: bold; }

        /* [3段目] 顔文字 ＋ 状態文字エリア */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px; /* 横の隙間 */
            height: 22px; /* 縦幅をコンパクトに抑える */
            width: 100%;
        }

        /* 🎯 顔アイコン：文字サイズ（20px）に合わせて綺麗に1:1で縮小 */
        .circle-stage {
            position: relative;
            width: 20px; height: 20px; 
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }
        .circle-stage img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.1s ease;
        }
        .circle-stage img.active { opacity: 1 !important; }

        /* 状態の文字：顔文字と同じ高さ（20px）の中で14pxフォントで超ハッキリ配置 */
        .status-text { 
            font-size: 14px; 
            font-weight: 900; 
            line-height: 20px; /* 顔の高さと完全同期 */
            white-space: nowrap;
        }

        /* [4段目] 日付 ＋ 時間 */
        .bottom-row {
            display: flex; 
            justify-content: center; 
            align-items: center;
            width: 96%; 
            margin: 0 auto; 
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 2px; 
            height: 16px;
        }
        .bottom-dark { background-color: rgba(255, 255, 255, 0.4) !important; }
        .time-stamp { 
            font-size: 9px; 
            font-family: monospace; 
            line-height: 1.0; 
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="signage-container">
        <div class="block data-block">
            <div class="label data-label">暑さ指数(WBGT値)</div>
            <div class="value-container"><span class="value" id="val-wbgt">21.5</span><span class="unit">℃</span></div>
            <div class="status-row">
                <div class="circle-stage">
                    <img src="1.png" class="face-1"><img src="2.png" class="face-2"><img src="3.png" class="face-3"><img src="4.png" class="face-4"><img src="5.png" class="face-5 active">
                </div>
                <span class="status-text">ほぼ安全</span>
            </div>
            <div class="bottom-row"><span class="time-stamp data-time">05/29 00:00:00</span></div>
        </div>

        <div class="block data-block">
            <div class="label data-label">気温</div>
            <div class="value-container"><span class="value" id="val-kion">23.0</span><span class="unit">℃</span></div>
            <div class="status-row">
                <div class="circle-stage">
                    <img src="1.png" class="face-1"><img src="2.png" class="face-2"><img src="3.png" class="face-3"><img src="4.png" class="face-4"><img src="5.png" class="face-5 active">
                </div>
                <span class="status-text">ほぼ安全</span>
            </div>
            <div class="bottom-row"><span class="time-stamp data-time">05/29 00:00:00</span></div>
        </div>

        <div class="block data-block">
            <div class="label data-label">黒球温度</div>
            <div class="value-container"><span class="value" id="val-koku">22.1</span><span class="unit">℃</span></div>
            <div class="status-row">
                <div class="circle-stage">
                    <img src="1.png" class="face-1"><img src="2.png" class="face-2"><img src="3.png" class="face-3"><img src="4.png" class="face-4"><img src="5.png" class="face-5 active">
                </div>
                <span class="status-text">ほぼ安全</span>
            </div>
            <div class="bottom-row"><span class="time-stamp data-time">05/29 00:00:00</span></div>
        </div>

        <div class="block data-block">
            <div class="label data-label">湿度</div>
            <div class="value-container"><span class="value" id="val-shitu">55.0</span><span class="unit">%</span></div>
            <div class="status-row">
                <div class="circle-stage">
                    <img src="1.png" class="face-1"><img src="2.png" class="face-2"><img src="3.png" class="face-3"><img src="4.png" class="face-4"><img src="5.png" class="face-5 active">
                </div>
                <span class="status-text">ほぼ安全</span>
            </div>
            <div class="bottom-row"><span class="time-stamp data-time">05/29 00:00:00</span></div>
        </div>

        <div class="block" style="background:#000; padding:0; display:flex; align-items:center; justify-content:center;">
            <img src="logo.png" style="width:100%; height:100%; object-fit:contain;">
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const timeString = `${month}/${date} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            document.querySelectorAll('.data-time').forEach(el => el.textContent = timeString);
        }
        setInterval(updateClock, 1000);

        const patterns = [
            { wbgt: "21.5", kion: "23.2", koku: "22.0", shitu: "55.0", bgColor: "#B2F1FF", txtColor: "#111", txt: "ほぼ安全", faceClass: ".face-5" },
            { wbgt: "24.5", kion: "26.5", koku: "25.1", shitu: "60.0", bgColor: "#B3FF99", txtColor: "#111", txt: "注　意", faceClass: ".face-4" },
            { wbgt: "27.8", kion: "29.1", koku: "28.5", shitu: "65.0", bgColor: "#FFFF80", txtColor: "#111", txt: "警　戒", faceClass: ".face-3" },
            { wbgt: "30.5", kion: "32.0", koku: "31.4", shitu: "70.0", bgColor: "#FFB366", txtColor: "#111", txt: "厳重警戒", faceClass: ".face-2" },
            { wbgt: "33.1", kion: "35.4", koku: "34.8", shitu: "75.0", bgColor: "#FF5050", txtColor: "#111", txt: "危　険", faceClass: ".face-1" }
        ];

        let step = 0;
        function loop() {
            const p = patterns[step];
            
            document.getElementById('val-wbgt').textContent = p.wbgt;
            document.getElementById('val-kion').textContent = p.kion;
            document.getElementById('val-koku').textContent = p.koku;
            document.getElementById('val-shitu').textContent = p.shitu;

            document.querySelectorAll('.data-block').forEach(b => {
                b.style.backgroundColor = p.bgColor;
                b.style.color = p.txtColor;
            });
            document.querySelectorAll('.status-text').forEach(t => t.textContent = p.txt);
            document.querySelectorAll('.data-label').forEach(l => l.className = 'label data-label text-dark');
            document.querySelectorAll('.bottom-row').forEach(row => row.className = 'bottom-row bottom-dark');

            document.querySelectorAll('.circle-stage').forEach(stage => {
                stage.querySelectorAll('img').forEach(img => img.classList.remove('active'));
                stage.querySelector(p.faceClass).classList.add('active');
            });

            step = (step + 1) % patterns.length;
        }
        
        setInterval(loop, 5000);
        loop();
    </script>
</body>
</html>
