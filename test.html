<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WBGTサイネージ・全判定パターン確認テスト</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; font-size: 20px; margin-bottom: 20px; }
        h2 { font-size: 16px; margin-top: 30px; border-left: 5px solid #99FFFF; padding-left: 10px; }
        
        /* 640x128 実機投影サイズシミュレーター */
        .test-frame {
            width: 640px;
            height: 128px;
            border: 2px solid #555;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background: black;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        
        .test-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .description-box {
            width: 640px;
            margin: 10px auto;
            background: #222;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
        }
        .desc-title { font-weight: bold; color: white; margin-bottom: 5px; }
        .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

    <h1>WBGTサイネージ・判定表示全パターン確認（公式カラー完全準拠）</h1>

    <h2>1. 【ほぼ安全】（~22.0℃）</h2>
    <div class="test-frame">
        <iframe class="test-iframe" src="index.html?test=safe"></iframe>
    </div>
    <div class="description-box">
        <div class="desc-title"><span class="color-dot" style="background:#99FFFF;"></span>ほぼ安全（水色）</div>
        背景色：#99FFFF / 文字色：黒（反転表示）
    </div>

    <h2>2. 【注意】（22.1℃~ 26.0℃）</h2>
    <div class="test-frame">
        <iframe class="test-iframe" src="index.html?test=attention"></iframe>
    </div>
    <div class="description-box">
        <div class="desc-title"><span class="color-dot" style="background:#99FF99;"></span>注意（緑）</div>
        背景色：#99FF99 / 文字色：黒（反転表示）
    </div>

    <h2>3. 【警戒】（26.1℃~29.0℃）</h2>
    <div class="test-frame">
        <iframe class="test-iframe" src="index.html?test=warning"></iframe>
    </div>
    <div class="description-box">
        <div class="desc-title"><span class="color-dot" style="background:#FFFF66;"></span>警戒（黄）</div>
        背景色：#FFFF66 / 文字色：黒（反転表示）
    </div>

    <h2>4. 【厳重警戒】（29.1℃~32.0℃）</h2>
    <div class="test-frame">
        <iframe class="test-iframe" src="index.html?test=severe"></iframe>
    </div>
    <div class="description-box">
        <div class="desc-title"><span class="color-dot" style="background:#FF9933;"></span>厳重警戒（オレンジ）</div>
        背景色：#FF9933 / 文字色：白
    </div>

    <h2>5. 【危険】（32.1℃~）</h2>
    <div class="test-frame">
        <iframe class="test-iframe" src="index.html?test=danger"></iframe>
    </div>
    <div class="description-box">
        <div class="desc-title"><span class="color-dot" style="background:#FF3333;"></span>危険（赤）</div>
        背景色：#FF3333 / 文字色：白
    </div>

</body>
</html>
