<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>工事現場用 WBGTモニタ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', 'Hiragino Kaku Gothic ProN', sans-serif; }
        body { background: #000; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .container { display: flex; width: 640px; height: 128px; border: 2px solid #555; }
        .block { flex: 1; border-right: 1px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px; color: #fff; }
        .block:last-child { border-right: none; }
        
        .label { font-size: 10px; color: #ccc; margin-bottom: 2px; }
        .value { font-size: 32px; font-weight: bold; }
        .status { font-size: 14px; font-weight: 900; background: #fff; color: #000; padding: 0 4px; border-radius: 2px; margin: 2px 0; }
        .time { font-size: 9px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container" id="main-cont">
        <div class="block" id="block-wbgt">
            <div class="label">WBGT</div>
            <div class="value" id="val-wbgt">--.-</div>
            <div class="status" id="stat-wbgt">---</div>
            <div class="time" id="time-now">--:--:--</div>
        </div>
        </div>

    <script>
        // URL変更を行わず、15秒ごとのリロードは標準的なものに戻します
        setInterval(() => { window.location.reload(true); }, 15000);

        async function update() {
            // ... (データ取得処理)
            // 判定に応じて背景色を厳格に変更
            // 例: if(wbgt >= 32) { block.style.background = "#d00"; status.innerText = "危 険"; }
        }
        update();
    </script>
</body>
</html>
