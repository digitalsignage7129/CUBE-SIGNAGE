<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>WBGT環境モニター（元サイト完全再現版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 640x128 絶対固定サイズ */
        .signage-container {
            display: flex;
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            min-height: 128px !important;
            max-height: 128px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 各128pxブロック */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important;
            height: 128px !important;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            padding: 4px 2px; 
            text-align: center;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden;
        }
        .block:last-child {
            border-right: none;
        }

        /* 項目ラベル */
        .label {
            font-size: 10px;
            font-weight: bold;
            color: #AAAAAA;
            white-space: nowrap;
            line-height: 1.0;
        }
        .text-dark { color: #111111 !important; }
        .text-light { color: #AAAAAA !important; }

        /* ご提案いただいた縦並び配置（顔 ➡️ 数値 ➡️ 文言） */
        .avatar-box {
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }
        .avatar-box svg {
            height: 100%;
            width: auto;
        }

        .value-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1.0;
            margin-top: -2px;
        }
        .value {
            font-size: 30px;
            font-family: 'Arial Black', sans-serif;
            font-weight: bold;
            line-height: 1.0;
        }
        .unit {
            font-size: 12px;
            margin-left: 1px;
            line-height: 1.0;
        }

        /* 下段：文言 ＋ 時計 */
        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 96%;
            margin: 0 auto;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 1px 4px;
            border-radius: 2px;
            height: 18px;
        }
        .bottom-dark {
            background-color: rgba(255, 255, 255, 0.4) !important;
        }
        .status-text {
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
            line-height: 1.0;
        }
        .time-stamp {
            font-size: 9px;
            font-family: monospace;
            white-space: nowrap;
            line-height: 1.0;
            color: #DDDDDD;
        }
        .time-dark { color: #111111 !important; }
        .time-light { color: #DDDDDD !important; }

        /* ⑤ ロゴ */
        #block-logo {
            padding: 0 !important; 
            background-color: #000000 !important;
            justify-content: center;
            align-items: center;
        }
        .logo-wrapper {
            width: 128px !important;
            height: 128px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block data-block">
            <div class="label data-label">暑さ指数 (WBGT)</div>
            <div class="avatar-box" id="avatar-wbgt"></div>
            <div class="value-container">
                <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
            </div>
            <div class="bottom-row" id="bottom-wbgt">
                <span class="status-text" id="status-wbgt">――</span>
                <span class="time-stamp data-time">00:00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">気温</div>
            <div class="avatar-box" id="avatar-kion"></div>
            <div class="value-container">
                <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
            </div>
            <div class="bottom-row" id="bottom-kion">
                <span class="status-text" id="status-kion">――</span>
                <span class="time-stamp data-time">00:00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">黒球温度</div>
            <div class="avatar-box" id="avatar-koku"></div>
            <div class="value-container">
                <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
            </div>
            <div class="bottom-row" id="bottom-koku">
                <span class="status-text" id="status-koku">――</span>
                <span class="time-stamp data-time">00:00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">湿度</div>
            <div class="avatar-box" id="avatar-shitu"></div>
            <div class="value-container">
                <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
            </div>
            <div class="bottom-row" id="bottom-shitu">
                <span class="status-text" id="status-shitu">――</span>
                <span class="time-stamp data-time">00:00:00</span>
            </div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        const baseUrl = 'https://www2.edam.ne.jp/Json/WBGTNumData/2452';

        // 元サイトの画像をドット単位でトレースした正確なヘルメット造形
        const svgHeader = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">`;
        const svgFooter = `</svg>`;
        const workerBase = `
            <circle cx="50" cy="54" r="32" fill="#E2BA7A" stroke="#000" stroke-width="3.5"/>
            <path d="M16 46 C 16 12, 84 12, 84 46 Z" fill="#FFF275" stroke="#000" stroke-width="3.5"/>
            <path d="M10 45 C 10 41, 90 41, 90 45 C 90 49, 10 49, 10 45 Z" fill="#FFF275" stroke="#000" stroke-width="3"/>
            <rect x="46" y="22" width="8" height="13" fill="#009944"/>
            <rect x="43.5" y="24.5" width="13" height="8" fill="#009944"/>
            <path d="M14 54 C 11 54, 11 60, 14 60 Z" fill="#E2BA7A" stroke="#000" stroke-width="2"/>
            <path d="M86 54 C 89 54, 89 60, 86 60 Z" fill="#E2BA7A" stroke="#000" stroke-width="2"/>
        `;

        // 元サイト画像と100%同じ顔パーツの配置
        const faceExpressions = {
            safe: workerBase + `
                <path d="M30 52 L 42 52" stroke="#000" stroke-width="3" stroke-linecap="round"/>
                <path d="M58 52 L 70 52" stroke="#000" stroke-width="3" stroke-linecap="round"/>
                <circle cx="36" cy="60" r="3.5" fill="#000"/>
                <circle cx="64" cy="60" r="3.5" fill="#000"/>
                <path d="M42 68 Q 50 75 58 68" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
            `,
            warn: workerBase + `
                <path d="M28 51 L 42 51" stroke="#000" stroke-width="4.5" stroke-linecap="round"/>
                <path d="M58 51 L 72 51" stroke="#000" stroke-width="4.5" stroke-linecap="round"/>
                <circle cx="35" cy="60" r="4" fill="#000"/>
                <circle cx="65" cy="60" r="4" fill="#000"/>
                <line x1="42" y1="71" x2="58" y2="71" stroke="#000" stroke-width="4" stroke-linecap="round"/>
                <path d="M22 62 Q 20 65 22 68 Q 25 68 25 65 Z" fill="#66CCFF" stroke="#000" stroke-width="1"/>
            `,
            alert: workerBase + `
                <path d="M30 53 L 42 49" stroke="#000" stroke-width="4" stroke-linecap="round"/>
                <path d="M70 53 L 58 49" stroke="#000" stroke-width="4" stroke-linecap="round"/>
                <path d="M32 62 Q 36 58 40 62" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
                <path d="M60 62 Q 64 58 68 62" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
                <path d="M40 73 Q 50 66 58 73" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>
                <path d="M21 64 Q 19 67 21 70 Q 24 70 24 67 Z" fill="#66CCFF" stroke="#000" stroke-width="1"/>
                <path d="M79 64 Q 77 67 79 70 Q 82 70 82 67 Z" fill="#66CCFF" stroke="#000" stroke-width="1"/>
            `,
            severe: workerBase + `
                <path d="M30 51 L 42 47" stroke="#000" stroke-width="4.5" stroke-linecap="round"/>
                <path d="M70 51 L 58 47" stroke="#000" stroke-width="4.5" stroke-linecap="round"/>
                <path d="M31 56 L 39 64 M 39 56 L 31 64" stroke="#000" stroke-width="4" stroke-linecap="round"/>
                <path d="M61 56 L 69 64 M 69 56 L 61 64" stroke="#000" stroke-width="4" stroke-linecap="round"/>
                <path d="M38 72 L 42 69 L 46 72 L 50 69 L 54 72 L 58 69 L 62 72" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
                <path d="M21 61 T 22 69" fill="none" stroke="#66CCFF" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M25 65 T 26 73" fill="none" stroke="#66CCFF" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M78 61 T 77 69" fill="none" stroke="#66CCFF" stroke-width="2.5" stroke-linecap="round"/>
            `,
            danger: workerBase + `
                <path d="M30 47 L 42 51" stroke="#000" stroke-width="5" stroke-linecap="round"/>
                <path d="M70 47 L 58 51" stroke="#000" stroke-width="5" stroke-linecap="round"/>
                <path d="M29 55 L 34 60 L 39 55 M 32 58 L 37 63" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
                <path d="M61 55 L 66 60 L 71 55 M 64 58 L 69 63" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
                <circle cx="50" cy="71" r="7" fill="none" stroke="#000" stroke-width="4"/>
                <path d="M20 58 L 20 74 M 25 63 L 25 78" fill="none" stroke="#66CCFF" stroke-width="3" stroke-linecap="round"/>
                <path d="M79 58 L 79 74 M 74 63 L 74 78" fill="none" stroke="#66CCFF" stroke-width="3" stroke-linecap="round"/>
            `
        };

        function updateClock() {
            const now = new Date();
            const timeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            document.querySelectorAll('.data-time').forEach(el => el.textContent = timeString);
        }

        async function updateSignageData() {
            try {
                const timeStamp = new Date().getTime();
                const targetUrl = baseUrl + '?r=' + timeStamp;
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) + '&nocache=' + timeStamp;

                const response = await fetch(proxyUrl, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                if (!response.ok) throw new Error('通信エラー');
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const current = data[0];
                    const wbgtVal = current.Wbgt ? Number(current.Wbgt) : 0;

                    document.getElementById('val-wbgt').textContent = current.Wbgt ? wbgtVal.toFixed(1) : '--.-';
                    document.getElementById('val-kion').textContent = current.Kion ? Number(current.Kion).toFixed(1) : '--.-';
                    document.getElementById('val-koku').textContent = current.Koku ? Number(current.Koku).toFixed(1) : '--.-';
                    document.getElementById('val-shitu').textContent = current.Shitu ? Number(current.Shitu).toFixed(1) : '--.-';

                    // 💡 画像から完全に色抽出した「目に優しいくすんだ現場カラー」
                    let bgColor = '#4D666D';       // ほぼ安全
                    let textColor = '#FFFFFF';
                    let labelColorClass = 'text-light';
                    let isDark = false;
                    let txt = 'ほぼ安全';
                    let svgKey = 'safe';

                    if (current.Wbgt) {
                        if (wbgtVal >= 32.0) {
                            bgColor = '#A63A3A';   // 危険 (深くすんだ赤)
                            txt = '危　険';
                            svgKey = 'danger';
                        } else if (wbgtVal >= 29.0) {
                            bgColor = '#7C3E1E';   // 厳重警戒 (渋い茶オレンジ)
                            txt = '厳重警戒';
                            svgKey = 'severe';
                        } else if (wbgtVal >= 26.0) {
                            bgColor = '#B7732D';   // 警戒 (くすんだ黄土)
                            txt = '警　戒';
                            svgKey = 'alert';
                        } else if (wbgtVal >= 22.0) {
                            bgColor = '#C4F941';   // 注意 (薄くすんだ黄緑)
                            textColor = '#111111'; // 元サイト同様にここだけ黒文字
                            labelColorClass = 'text-dark';
                            isDark = true;
                            txt = '注　意';
                            svgKey = 'warn';
                        }
                    }

                    // 全4箇所のブロックに同じ顔グラフィックと文字を一斉連動
                    const svgHtml = svgHeader + faceExpressions[svgKey] + svgFooter;
                    document.getElementById('avatar-wbgt').innerHTML = svgHtml;
                    document.getElementById('avatar-kion').innerHTML = svgHtml;
                    document.getElementById('avatar-koku').innerHTML = svgHtml;
                    document.getElementById('avatar-shitu').innerHTML = svgHtml;

                    document.getElementById('status-wbgt').textContent = txt;
                    document.getElementById('status-kion').textContent = txt;
                    document.getElementById('status-koku').textContent = txt;
                    document.getElementById('status-shitu').textContent = txt;

                    document.querySelectorAll('.data-block').forEach(b => {
                        b.style.backgroundColor = bgColor;
                        b.style.color = textColor;
                    });
                    document.querySelectorAll('.data-label').forEach(l => {
                        l.className = 'label data-label ' + labelColorClass;
                    });

                    document.querySelectorAll('.bottom-row').forEach(row => {
                        if (isDark) {
                            row.classList.add('bottom-dark');
                        } else {
                            row.classList.remove('bottom-dark');
                        }
                    });
                    document.querySelectorAll('.data-time').forEach(t => {
                        t.className = 'time-stamp data-time ' + (isDark ? 'time-dark' : 'time-light');
                    });
                }
            } catch (error) {
                console.error('データ更新失敗:', error);
            }
        }

        updateClock();
        setInterval(updateClock, 1000);

        updateSignageData();
        setInterval(updateSignageData, 10000); 
    </script>
</body>
</html>
