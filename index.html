<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境モニター サイネージ</title>
    <style>
        /* 画面全体の初期化（スクロールバー非表示、黒背景） */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        /* 1:5 の横長比率を保つためのコンテナ */
        .signage-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 各エリアの共通スタイル（均等5分割） */
        .block {
            flex: 1;
            height: 100%;
            border-right: 2px solid #222222; /* 焼き付き防止を兼ねた暗めの境界線 */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 上部に数値、下部に時刻を固定 */
            padding: 4vh 2vw;
            text-align: center;
        }
        .block:last-child {
            border-right: none;
        }

        /* 項目タイトル */
        .label {
            font-size: 2.2vw;
            font-weight: bold;
            color: #AAAAAA;
        }

        /* 数値表示エリア */
        .value-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .value {
            font-size: 7.5vw;
            line-height: 1;
        }
        .unit {
            font-size: 3.5vw;
            margin-left: 0.5vw;
        }

        /* 下部の日付・時刻エリア */
        .time-stamp {
            font-size: 1.6vw;
            color: #CCCCCC;
            background-color: #111111;
            padding: 0.6vh 0;
            border-radius: 4px;
            font-family: monospace; /* 文字ズレ防止 */
        }

        /* ① WBGT専用ブロック（背景色変化のスムーズ化） */
        #block-wbgt {
            background-color: #000000; 
            transition: background-color 0.5s ease;
        }

        /* ⑤ ロゴ専用エリア */
        #block-logo {
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        .logo-wrapper {
            width: 85%;
            aspect-ratio: 1 / 1; /* 正方形を維持 */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* アスペクト比を壊さず収める */
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block" id="block-wbgt">
            <div class="label">暑さ指数 (WBGT)</div>
            <div class="value-container">
                <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
            </div>
            <div class="time-stamp" id="time-wbgt">----/--/-- --:--:--</div>
        </div>

        <div class="block">
            <div class="label">気温</div>
            <div class="value-container">
                <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
            </div>
            <div class="time-stamp" id="time-kion">----/--/-- --:--:--</div>
        </div>

        <div class="block">
            <div class="label">黒球温度</div>
            <div class="value-container">
                <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
            </div>
            <div class="time-stamp" id="time-koku">----/--/-- --:--:--</div>
        </div>

        <div class="block">
            <div class="label">湿度</div>
            <div class="value-container">
                <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
            </div>
            <div class="time-stamp" id="time-shitu">----/--/-- --:--:--</div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        // 【超重要】HTMLページではなく、E-DAMが内部で叩いている「データAPI」の直URLに変更
        const targetUrl = 'https://www2.edam.ne.jp/Public/00574/Sokutei/GetWbgtRN?LoID=2452'; 
        
        // CORS回避プロキシを通す
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

        async function updateSignageData() {
            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('ネットワーク応答が正常ではありません');
                
                // 今回は相手が100%ピュアなJSONデータを返してくるので、直接パースします
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const current = data[0];

                    // 各数値をセット（安全に小数第1位へ変換）
                    document.getElementById('val-wbgt').textContent = current.Wbgt ? Number(current.Wbgt).toFixed(1) : '--.-';
                    document.getElementById('val-kion').textContent = current.Kion ? Number(current.Kion).toFixed(1) : '--.-';
                    document.getElementById('val-koku').textContent = current.Koku ? Number(current.Koku).toFixed(1) : '--.-';
                    document.getElementById('val-shitu').textContent = current.Shitu ? Number(current.Shitu).toFixed(1) : '--.-';

                    // 各ブロックの下部へ「日付現時刻」を一斉セット
                    const currentTimeString = current.Time || '----/--/-- --:--:--';
                    document.getElementById('time-wbgt').textContent = currentTimeString;
                    document.getElementById('time-kion').textContent = currentTimeString;
                    document.getElementById('time-koku').textContent = currentTimeString;
                    document.getElementById('time-shitu').textContent = currentTimeString;

                    // WBGTの数値に基づいた、焼き付きを起こしにくい深めのアラート背景色
                    const wbgtBlock = document.getElementById('block-wbgt');
                    const wbgtVal = Number(current.Wbgt);
                    if (wbgtVal >= 31.0) {
                        wbgtBlock.style.backgroundColor = '#660000'; // 危険（深赤）
                    } else if (wbgtVal >= 28.0) {
                        wbgtBlock.style.backgroundColor = '#553300'; // 厳重警戒（深橙）
                    } else {
                        wbgtBlock.style.backgroundColor = '#000000'; // 通常（黒）
                    }
                }
            } catch (error) {
                console.error('データ取得または解析エラー:', error);
            }
        }

        // ページを読み込んだ瞬間に1回目を実行
        updateSignageData();
        
        // 以降、10秒（10000ミリ秒）ごとにバックグラウンドで自動通信・画面更新（高頻度リアルタイム対応）
        setInterval(updateSignageData, 10000); 
    </script>
</body>
</html>
