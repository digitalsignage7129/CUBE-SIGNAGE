<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>WBGT環境モニター（5面クローン・完全同期ループ版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 💻 全体で 640px × 128px の絶対固定解像度 */
        .signage-container {
            position: relative;
            display: flex;
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            min-height: 128px !important;
            max-height: 128px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 🔄 側面エリア：5つ目のダミーが入るため、幅を 640px フルに確保 */
        .side-stage {
            flex: 0 0 640px !important;
            width: 640px !important;
            height: 128px !important;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* 128px正方形ブロック（初期状態はアニメーションあり） */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important;
            height: 128px !important;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            padding: 2px 2px 0px 2px;
            text-align: center;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Arial Black', 'Impact', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
            /* 💡 個別のワープではなく全体を一斉に滑らかに動かすためのトランジション設定 */
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease, color 0.4s ease;
        }

        /* ⚡ 一斉引き戻し（ワープ）用のノーアニメーションクラス */
        .no-transition {
            transition: none !important;
        }

        /* 項目ラベル */
        .label {
            font-size: 17px;
            font-weight: 900;
            color: #FFFFFF !important;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: -0.5px;
            text-shadow: 1px 1px 0px #000000;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }
        .text-dark { color: #000000 !important; text-shadow: none !important; }

        /* 数値表示 */
        .value-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 0.9;
            margin-top: -2px; 
        }
        .value {
            font-size: 42px;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -1.5px;
        }
        .unit {
            font-size: 14px;
            font-weight: 900;
            margin-left: 1px;
            line-height: 0.9;
        }

        /* 顔文字ステータス */
        .status-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            height: 22px;
            margin-top: -1px;
            margin-bottom: 2px;
        }
        .avatar-box {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .avatar-img {
            height: 100%;
            width: 100%;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.6));
        }
        .status-text {
            font-size: 18px;
            font-weight: 900;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: 0.5px;
        }
        
        /* 下段時計用ベルト */
        .bottom-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            height: 26px;
        }
        .bottom-dark {
            background-color: rgba(0, 0, 0, 0.15) !important;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        .time-stamp {
            font-size: 16px;
            font-family: 'Arial Black', 'Impact', monospace;
            font-weight: 900;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: 0.2px;
        }
        .time-dark { color: #000000 !important; text-shadow: none !important; }
        .time-light { color: #FFFFFF !important; text-shadow: 1px 1px 0px #000000; }

        /* 🔝 上面エリア：右端固定、最前面（z-index: 10） */
        .logo-block {
            position: absolute;
            top: 0;
            right: 0;
            flex: 0 0 128px !important;
            width: 128px !important;
            height: 128px !important;
            padding: 0 !important; 
            background-color: #000000 !important;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-left: 1px solid #1a1a1a;
        }
        .logo-wrapper {
            width: 128px !important;
            height: 128px !important;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000000;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            will-change: transform;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(0deg);
        }
    </style>
</head>
<body>

    <div class="signage-container">
        
        <!-- 側面：4つの実データ ＋ 1つのクローン(pane-4) の計5面構成 -->
        <div class="side-stage" id="side-stage">
            
            <div class="block data-block" id="pane-0">
                <div class="label data-label">暑さ指数</div>
                <div class="value-container">
                    <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
                </div>
                <div class="status-area">
                    <div class="avatar-box"><img src="5.png" id="img-wbgt" class="avatar-img" alt="顔"></div>
                    <span class="status-text" id="status-wbgt">――</span>
                </div>
                <div class="bottom-row" id="bottom-wbgt"><span class="time-stamp data-time">00/00 00:00</span></div>
            </div>

            <div class="block data-block" id="pane-1">
                <div class="label data-label">現場気温</div>
                <div class="value-container">
                    <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
                </div>
                <div class="status-area">
                    <div class="avatar-box"><img src="5.png" id="img-kion" class="avatar-img" alt="顔"></div>
                    <span class="status-text" id="status-kion">――</span>
                </div>
                <div class="bottom-row" id="bottom-kion"><span class="time-stamp data-time">00/00 00:00</span></div>
            </div>

            <div class="block data-block" id="pane-2">
                <div class="label data-label">黒球温度</div>
                <div class="value-container">
                    <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
                </div>
                <div class="status-area">
                    <div class="avatar-box"><img src="5.png" id="img-koku" class="avatar-img" alt="顔"></div>
                    <span class="status-text" id="status-koku">――</span>
                </div>
                <div class="bottom-row" id="bottom-koku"><span class="time-stamp data-time">00/00 00:00</span></div>
            </div>

            <div class="block data-block" id="pane-3">
                <div class="label data-label">現場湿度</div>
                <div class="value-container">
                    <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
                </div>
                <div class="status-area">
                    <div class="avatar-box"><img src="5.png" id="img-shitu" class="avatar-img" alt="顔"></div>
                    <span class="status-text" id="status-shitu">――</span>
                </div>
                <div class="bottom-row" id="bottom-shitu"><span class="time-stamp data-time">00/00 00:00</span></div>
            </div>

            <!-- 💡 5つ目のクローンブロック（「暑さ指数」と全く同じデータがリアルタイム同期します） -->
            <div class="block data-block" id="pane-4">
                <div class="label data-label">暑さ指数</div>
                <div class="value-container">
                    <span class="value" id="val-wbgt-clone">--.-</span><span class="unit">℃</span>
                </div>
                <div class="status-area">
                    <div class="avatar-box"><img src="5.png" id="img-wbgt-clone" class="avatar-img" alt="顔"></div>
                    <span class="status-text" id="status-wbgt-clone">――</span>
                </div>
                <div class="bottom-row" id="bottom-wbgt-clone"><span class="time-stamp data-time">00/00 00:00</span></div>
            </div>

        </div>

        <!-- 上面（128px分）：右端に絶対配置（5つ目のクローンブロックの真上に重なる） -->
        <div class="logo-block">
            <div class="logo-wrapper">
                <img src="logo.png" id="rotating-logo" alt="ロゴ">
            </div>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const corpId = urlParams.get('CorpID') || '18016';
        const loId = urlParams.get('LoID') || '2480';
        const testParam = urlParams.get('test');

        const dataUrl = `data/${corpId}/${loId}.json`;

        function updateClock() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const timeString = `${month}/${date} ${hours}:${minutes}`;
            document.querySelectorAll('.data-time').forEach(el => el.textContent = timeString);
        }

        // 💡 全5枚を等間隔で初期配置 [0px, 128px, 256px, 384px, 512px]
        const TOTAL_PANES = 5;
        let currentStep = 0;

        function initPositions() {
            for (let i = 0; i < TOTAL_PANES; i++) {
                const pane = document.getElementById(`pane-${i}`);
                if (pane) {
                    pane.classList.add('no-transition'); // ワープ時はアニメーションを切る
                    pane.style.transform = `translateX(${i * 128}px)`;
                    // リフローを起こして即時反映
                    pane.offsetHeight;
                    pane.classList.remove('no-transition');
                }
            }
        }

        function rotateSidePanes() {
            currentStep++;

            // 💡 1マス（128px分）全員を一斉に左へスライド移動
            for (let i = 0; i < TOTAL_PANES; i++) {
                const pane = document.getElementById(`pane-${i}`);
                if (pane) {
                    const nextLeft = (i - currentStep) * 128;
                    pane.style.transform = `translateX(${nextLeft}px)`;
                }
            }

            // 上面ロゴの回転（スライド段階に合わせて90度ずつ回す）
            const logoImg = document.getElementById('rotating-logo');
            if (logoImg) {
                logoImg.style.transform = `rotate(${currentStep * -90}deg)`;
            }

            // 💡 4回スライドして「1周（512px分）」動ききったら、ノーモーションで初期位置へ全員同時に戻す
            if (currentStep === 4) {
                setTimeout(() => {
                    currentStep = 0;
                    initPositions();
                    if (logoImg) {
                        logoImg.classList.add('no-transition');
                        logoImg.style.transform = `rotate(0deg)`;
                        logoImg.offsetHeight;
                        logoImg.classList.remove('no-transition');
                    }
                }, 850); // アニメーション時間（800ms）の直後に実行
            }
        }

        async function updateSignageData() {
            try {
                let wbgtVal = null;
                let data = { kion: "0.0", koku: "0.0", shitu: "0" };
                let forceLevel = null;

                if (testParam) {
                    forceLevel = testParam;
                    if (testParam === 'danger')    { wbgtVal = 33.5; data = { kion: "35.2", koku: "38.0", shitu: "75" }; }
                    if (testParam === 'severe')    { wbgtVal = 30.2; data = { kion: "31.8", koku: "33.5", shitu: "68" }; }
                    if (testParam === 'warning')   { wbgtVal = 27.5; data = { kion: "29.0", koku: "29.5", shitu: "60" }; }
                    if (testParam === 'attention') { wbgtVal = 24.2; data = { kion: "26.1", koku: "25.0", shitu: "55" }; }
                    if (testParam === 'safe')      { wbgtVal = 20.5; data = { kion: "22.0", koku: "21.0", shitu: "48" }; }
                } else {
                    const timeStamp = new Date().getTime();
                    const response = await fetch(`${dataUrl}?r=${timeStamp}`, { cache: 'no-store' });
                    if (!response.ok) throw new Error('データ通信エラー');
                    const jsonData = await response.json();
                    data = jsonData;
                    wbgtVal = data.wbgt !== "0.0" ? Number(data.wbgt) : null;
                }
                
                // 💡 実データと5枚目のクローンデータの両方に値を書き込む
                const displayWbgt = wbgtVal !== null ? wbgtVal.toFixed(1) : '--.-';
                document.getElementById('val-wbgt').textContent = displayWbgt;
                document.getElementById('val-wbgt-clone').textContent = displayWbgt;

                document.getElementById('val-kion').textContent = data.kion !== "0.0" ? Number(data.kion).toFixed(1) : '--.-';
                document.getElementById('val-koku').textContent = data.koku !== "0.0" ? Number(data.koku).toFixed(1) : '--.-';
                document.getElementById('val-shitu').textContent = data.shitu !== "0" ? Number(data.shitu).toFixed(0) : '--';

                let levelKey = 'safe';
                if (forceLevel) {
                    levelKey = forceLevel;
                } else if (wbgtVal !== null) {
                    if (wbgtVal >= 32.1) levelKey = 'danger';
                    else if (wbgtVal >= 29.1) levelKey = 'severe';
                    else if (wbgtVal >= 26.1) levelKey = 'warning';
                    else if (wbgtVal >= 22.1) levelKey = 'attention';
                    else levelKey = 'safe';
                }

                const themeMap = {
                    'danger':    { bg: '#FF3333', text: '#FFFFFF', txt: '危 険',    img: '1.png', dark: false },
                    'severe':    { bg: '#FF9933', text: '#FFFFFF', txt: '厳重警戒',  img: '2.png', dark: false },
                    'warning':   { bg: '#FFFF66', text: '#000000', txt: '警 戒',    img: '3.png', dark: true  },
                    'attention': { bg: '#99FF99', text: '#000000', txt: '注 意',    img: '4.png', dark: true  },
                    'safe':      { bg: '#99FFFF', text: '#000000', txt: 'ほぼ安全',  img: '5.png', dark: true  }
                };

                const theme = themeMap[levelKey];

                // クローン枠も含めて画像とテキストを一括更新
                const imgIds = ['img-wbgt', 'img-kion', 'img-koku', 'img-shitu', 'img-wbgt-clone'];
                imgIds.forEach(id => {
                    const imgEl = document.getElementById(id);
                    if (imgEl) imgEl.src = theme.img;
                });

                const statusIds = ['status-wbgt', 'status-kion', 'status-koku', 'status-shitu', 'status-wbgt-clone'];
                statusIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.textContent = theme.txt;
                });

                document.querySelectorAll('.data-block').forEach(b => {
                    b.style.backgroundColor = theme.bg;
                    b.style.color = theme.text;
                });

                document.querySelectorAll('.data-label').forEach(l => {
                    if (theme.dark) l.classList.add('text-dark');
                    else l.classList.remove('text-dark');
                });

                document.querySelectorAll('.bottom-row').forEach(row => {
                    if (theme.dark) row.classList.add('bottom-dark');
                    else row.classList.remove('bottom-dark');
                });

                document.querySelectorAll('.data-time').forEach(t => {
                    t.className = theme.dark ? 'time-stamp data-time time-dark' : 'time-stamp data-time time-light';
                });

            } catch (error) {
                console.error('データ読み込み失敗:', error);
            }
        }

        // 初期配置実行
        initPositions();

        updateClock();
        setInterval(updateClock, 1000);

        updateSignageData();
        setInterval(updateSignageData, 10000);

        // 5秒ごとに盤面全体を一斉スライド
        setInterval(rotateSidePanes, 5000);
    </script>
</body>
</html>
