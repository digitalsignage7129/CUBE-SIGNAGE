<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>環境モニター サイネージ（横長640x128専用版）</title>
    <style>
        /* 画面全体の初期化 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex; /* 横並び（左から右）に戻します */
        }

        /* 5分割コンテナ */
        .signage-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 【修正】横長画面で、各ブロックを「横幅20%（128px）× 高さ100%（128px）」に完全固定 */
        .block {
            flex: 0 0 20%; 
            width: 20%;
            max-width: 20%;
            min-width: 20%;
            height: 100%;
            
            border-right: 2px solid #222222; /* 横並び用の右境界線 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* 💡 高さが128pxしかないため、上下の余白を極限までタイト（4px）にして見切れを徹底防御 */
            padding: 4px 2px; 
            text-align: center;
            background-color: #000000;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow: hidden;
        }
        .block:last-child {
            border-right: none;
        }

        /* 項目タイトル（128pxの幅に1行で収まるサイズ） */
        .label {
            font-size: 11px;
            font-weight: bold;
            color: #AAAAAA;
            white-space: nowrap;
            line-height: 1.1;
        }
        .text-dark { color: #111111 !important; }
        .text-light { color: #AAAAAA !important; }

        /* 数値・顔文字表示エリア（高さ128pxのなかに綺麗に収める） */
        .value-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 1px 0;
        }
        .value-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
        }
        .value {
            font-size: 32px; /* 128pxの高さでも絶対につぶれないクッキリサイズ */
            font-family: 'Arial Black', sans-serif;
            line-height: 1;
        }
        .unit {
            font-size: 13px;
            margin-left: 1px;
        }

        /* 巨大顔文字（上下の隙間にピタッと収まるサイズ） */
        .status-emoji {
            font-size: 24px; 
            line-height: 1;
            margin-top: 1px;
            display: block;
        }

        /* 下部の日付・時刻エリア */
        .time-stamp {
            font-size: 9px; /* 128pxの横幅の中に「12:34:56」が1行で収まるサイズ */
            color: #CCCCCC;
            background-color: #111111;
            padding: 2px 0;
            border-radius: 3px;
            font-family: monospace;
            white-space: nowrap;
            width: 95%;
            margin: 0 auto;
            line-height: 1;
        }
        .time-dark {
            background-color: rgba(0,0,0,0.4) !important;
            color: #111111 !important;
        }

        /* ⑤ ロゴ専用エリア（横128px×縦128pxの正方形の中に完璧に収める） */
        #block-logo {
            justify-content: center;
            align-items: center;
            padding: 4px;
            background-color: #000000 !important;
        }
        .logo-wrapper {
            width: 90%;
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 縦横比を壊さず、半分見切れるのを完全に防止 */
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block data-block">
            <div class="label data-label">暑さ指数 (WBGT)</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-wbgt">――</span>
            </div>
            <div class="time-stamp data-time" id="time-wbgt">--:--:--</div>
        </div>

        <div class="block data-block">
            <div class="label data-label">気温</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-kion">――</span>
            </div>
            <div class="time-stamp data-time" id="time-kion">--:--:--</div>
        </div>

        <div class="block data-block">
            <div class="label data-label">黒球温度</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-koku">――</span>
            </div>
            <div class="time-stamp data-time" id="time-koku">--:--:--</div>
        </div>

        <div class="block data-block">
            <div class="label data-label">湿度</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
                </div>
                <span class="status-emoji" id="emoji-shitu">――</span>
            </div>
            <div class="time-stamp data-time" id="time-shitu">--:--:--</div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        const baseUrl = 'https://www2.edam.ne.jp/Json/WBGTNumData/2452';

        async function updateSignageData() {
            try {
                const timeStamp = new Date().getTime();
                const targetUrl = baseUrl + '?r=' + timeStamp;
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) + '&nocache=' + timeStamp;

                const response = await fetch(proxyUrl, {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (!response.ok) throw new Error('ネットワーク応答が正常ではありません');
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const current = data[0];
                    const wbgtVal = current.Wbgt ? Number(current.Wbgt) : 0;

                    // 1. 数値セット
                    document.getElementById('val-wbgt').textContent = current.Wbgt ? wbgtVal.toFixed(1) : '--.-';
                    document.getElementById('val-kion').textContent = current.Kion ? Number(current.Kion).toFixed(1) : '--.-';
                    document.getElementById('val-koku').textContent = current.Koku ? Number(current.Koku).toFixed(1) : '--.-';
                    document.getElementById('val-shitu').textContent = current.Shitu ? Number(current.Shitu).toFixed(1) : '--.-';

                    // 2. 時刻セット（128px幅に収めるため「時:分:秒」のみを表示）
                    let timeString = '――:――';
                    if (current.Time) {
                        const parts = current.Time.split(' ');
                        if (parts.length > 1) {
                            timeString = parts[1];
                        } else {
                            timeString = current.Time;
                        }
                    }
                    document.getElementById('time-wbgt').textContent = timeString;
                    document.getElementById('time-kion').textContent = timeString;
                    document.getElementById('time-koku').textContent = timeString;
                    document.getElementById('time-shitu').textContent = timeString;

                    // 3. アラート定義
                    let bgColor = '#000000';
                    let textColor = '#FFFFFF';
                    let labelColorClass = 'text-light';
                    let timeColorClass = '';
                    let currentEmoji = '――';

                    if (current.Wbgt) {
                        if (wbgtVal >= 31.0) {
                            bgColor = '#880000';
                            currentEmoji = '😭';
                        } else if (wbgtVal >= 28.0) {
                            bgColor = '#A04000';
                            currentEmoji = '😫';
                        } else if (wbgtVal >= 25.0) {
                            bgColor = '#B39200';
                            textColor = '#000000';
                            labelColorClass = 'text-dark';
                            timeColorClass = 'time-dark';
                            currentEmoji = '😐';
                        } else {
                            bgColor = '#003366';
                            currentEmoji = '😊';
                        }
                    }

                    // 4. 各要素への一斉適用
                    const blocks = document.querySelectorAll('.data-block');
                    const labels = document.querySelectorAll('.data-label');
                    const times = document.querySelectorAll('.data-time');
                    const emojis = document.querySelectorAll('.status-emoji');

                    blocks.forEach(b => {
                        b.style.backgroundColor = bgColor;
                        b.style.color = textColor;
                    });

                    labels.forEach(l => {
                        l.className = 'label data-label ' + labelColorClass;
                    });

                    times.forEach(t => {
                        if (timeColorClass) {
                            t.classList.add('time-dark');
                        } else {
                            t.classList.remove('time-dark');
                        }
                    });

                    emojis.forEach(e => {
                        e.textContent = currentEmoji;
                    });
                }
            } catch (error) {
                console.error('データ取得または解析エラー:', error);
            }
        }

        updateSignageData();
        setInterval(updateSignageData, 10000); 
    </script>
</body>
</html>
