<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>環境モニター サイネージ（縦ハミ出し完全排除版）</title>
    <style>
        /* 画面全体の初期化 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        /* 5分割コンテナ */
        .signage-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 各ブロック：横幅20%固定、縦ハミ出しを完全防御 */
        .block {
            flex: 0 0 20%; 
            width: 20%;
            max-width: 20%;
            min-width: 20%;
            height: 100%;
            
            border-right: 1px solid #222222;
            display: flex;
            flex-direction: column;
            /* 💡 上下「完全中央」に中身を寄せることで、上寄りを解消 */
            justify-content: center; 
            align-items: center;
            padding: 2px; 
            text-align: center;
            background-color: #000000;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow: hidden;
        }
        .block:last-child {
            border-right: none;
        }

        /* 💡 タイトルエリア：横並びで時刻をドッキング */
        .title-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3px;
            width: 100%;
            margin-bottom: 2px;
        }
        .label {
            font-size: 11px;
            font-weight: bold;
            color: #AAAAAA;
            white-space: nowrap;
            line-height: 1.0;
        }
        /* 💡 タイトルの真横に表示する超省スペース時刻スタイル */
        .time-mini {
            font-size: 9px;
            color: #888888;
            font-family: monospace;
            line-height: 1.0;
        }
        .text-dark { color: #111111 !important; }
        .text-light { color: #AAAAAA !important; }
        .time-dark { color: #333333 !important; }
        .time-light { color: #888888 !important; }

        /* 数値・顔文字表示エリア（完全センター配置） */
        .value-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .value-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1.0;
        }
        .value {
            font-size: 34px; /* 上下が浮いた分、綺麗に収まるサイズ */
            font-family: 'Arial Black', sans-serif;
            line-height: 1.0;
        }
        .unit {
            font-size: 13px;
            margin-left: 1px;
            line-height: 1.0;
        }

        /* 巨大顔文字 */
        .status-emoji {
            font-size: 24px; 
            line-height: 1.0;
            margin-top: 3px;
            display: block;
        }

        /* ⑤ ロゴ専用エリア（下見切れを力づくで防衛） */
        #block-logo {
            justify-content: center;
            align-items: center;
            padding: 0; 
            background-color: #000000 !important;
        }
        .logo-wrapper {
            width: 100%;
            /* 💡 高さを「最大75%」にわざと制限し、下側が絶対に削られない安全圏を作ります */
            height: 75%; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* アスペクト比を維持して安全圏内に収める */
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block data-block">
            <div class="title-row">
                <span class="label data-label">暑さ指数</span>
                <span class="time-mini data-time" id="time-wbgt">(--:--)</span>
            </div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-wbgt">――</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="title-row">
                <span class="label data-label">気温</span>
                <span class="time-mini data-time" id="time-kion">(--:--)</span>
            </div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-kion">――</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="title-row">
                <span class="label data-label">黒球</span>
                <span class="time-mini data-time" id="time-koku">(--:--)</span>
            </div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-koku">――</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="title-row">
                <span class="label data-label">湿度</span>
                <span class="time-mini data-time" id="time-shitu">(--:--)</span>
            </div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
                </div>
                <span class="status-emoji" id="emoji-shitu">――</span>
            </div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        const baseUrl = 'https://www2.edam.ne.jp/Json/WBGTNumData/2452';

        async function updateSignageData() {
            try {
                const timeStamp = new Date().getTime();
                const targetUrl = baseUrl + '?r=' + timeStamp;
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) + '&nocache=' + timeStamp;

                const response = await fetch(proxyUrl, {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (!response.ok) throw new Error('ネットワーク応答が正常ではありません');
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const current = data[0];
                    const wbgtVal = current.Wbgt ? Number(current.Wbgt) : 0;

                    // 1. 数値セット
                    document.getElementById('val-wbgt').textContent = current.Wbgt ? wbgtVal.toFixed(1) : '--.-';
                    document.getElementById('val-kion').textContent = current.Kion ? Number(current.Kion).toFixed(1) : '--.-';
                    document.getElementById('val-koku').textContent = current.Koku ? Number(current.Koku).toFixed(1) : '--.-';
                    document.getElementById('val-shitu').textContent = current.Shitu ? Number(current.Shitu).toFixed(1) : '--.-';

                    // 2. タイトル横の時刻セット（省スペース用に 分 までの「時:分」に短縮）
                    let timeString = '(--:--)';
                    if (current.Time) {
                        const parts = current.Time.split(' ');
                        if (parts.length > 1) {
                            const hm = parts[1].split(':');
                            if (hm.length > 1) timeString = `(${hm[0]}:${hm[1]})`;
                        }
                    }
                    document.getElementById('time-wbgt').textContent = timeString;
                    document.getElementById('time-kion').textContent = timeString;
                    document.getElementById('time-shitu').textContent = timeString;
                    // ※黒球温度の時刻ID不一致バグもここでついでに修正して完全同期
                    const kokuTimeEl = document.getElementById('time-koku');
                    if (kokuTimeEl) kokuTimeEl.textContent = timeString;

                    // 3. アラート定義
                    let bgColor = '#000000';
                    let textColor = '#FFFFFF';
                    let labelColorClass = 'text-light';
                    let timeColorClass = 'time-light';
                    let currentEmoji = '――';

                    if (current.Wbgt) {
                        if (wbgtVal >= 31.0) {
                            bgColor = '#880000';
                            currentEmoji = '😭';
                        } else if (wbgtVal >= 28.0) {
                            bgColor = '#A04000';
                            currentEmoji = '😫';
                        } else if (wbgtVal >= 25.0) {
                            bgColor = '#B39200';
                            textColor = '#000000';
                            labelColorClass = 'text-dark';
                            timeColorClass = 'time-dark';
                            currentEmoji = '😐';
                        } else {
                            bgColor = '#003366';
                            currentEmoji = '😊';
                        }
                    }

                    // 4. 一斉適用
                    const blocks = document.querySelectorAll('.data-block');
                    const labels = document.querySelectorAll('.data-label');
                    const times = document.querySelectorAll('.data-time');
                    const emojis = document.querySelectorAll('.status-emoji');

                    blocks.forEach(b => {
                        b.style.backgroundColor = bgColor;
                        b.style.color = textColor;
                    });

                    labels.forEach(l => {
                        l.className = 'label data-label ' + labelColorClass;
                    });

                    times.forEach(t => {
                        lName = t.className.split(' ')[0];
                        t.className = lName + ' data-time ' + timeColorClass;
                    });

                    emojis.forEach(e => {
                        e.textContent = currentEmoji;
                    });
                }
            } catch (error) {
                console.error('データ取得または解析エラー:', error);
            }
        }

        updateSignageData();
        setInterval(updateSignageData, 10000); 
    </script>
</body>
</html>
