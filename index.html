<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBE SIGNAGE - WBGT Monitor</title>
    <style>
        /* 💡 物理的なキューブ解像度 (横640px × 縦128px) を絶対死守 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            width: 640px;
            height: 128px;
            user-select: none;
        }

        /* 全体コンテナ */
        .container {
            display: flex;
            width: 640px;
            height: 128px;
            overflow: hidden;
            position: relative;
        }

        /* 🔄 側面4面 (128px × 4面 = 512px) の無限ループ表示エリア */
        .sides-window {
            width: 512px;
            height: 128px;
            overflow: hidden;
            position: relative;
        }

        /* カルーセル外枠：滑らかなスライドのために will-change と transform を最適化 */
        .sides-track {
            display: flex;
            width: max-content;
            height: 128px;
            position: absolute;
            left: 0;
            top: 0;
            will-change: transform;
        }

        /* 📦 1面あたりの正方形サイズ (128px × 128px) を定義 */
        .pane {
            width: 128px;
            height: 128px;
            position: relative;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 4px 2px 0 2px;
            border-right: 1px solid rgba(0, 0, 0, 0.4);
            transition: background-color 0.5s ease;
        }

        /* 5面目：上面ロゴエリア (128px × 128px) は右端に完全固定 */
        .logo-pane {
            width: 128px;
            height: 128px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            right: 0;
            top: 0;
            z-index: 10;
            padding: 4px;
        }
        .logo-pane img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 🎨 写真のデザイン・文字装飾を完全再現 */
        .pane-title {
            font-size: 14px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 0px;
            z-index: 2;
            letter-spacing: -0.5px;
        }

        .value-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            height: 48px;
            margin-top: -4px;
            z-index: 2;
        }
        .pane-value {
            font-size: 46px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 3px 6px rgba(0,0,0,0.9);
            line-height: 1;
            letter-spacing: -1px;
        }
        .pane-unit {
            font-size: 15px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-left: 1px;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin-top: 1px;
            z-index: 2;
            width: 120px;
        }
        .status-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
            filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.8));
        }
        .status-text {
            font-size: 15px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000, 0 1px 3px rgba(0,0,0,0.8);
            white-space: nowrap;
            letter-spacing: -1px;
        }

        /* 下段の黒帯時計エリア */
        .time-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background: linear-gradient(to bottom, #2c1a04 0%, #120a01 100%);
            border-top: 1px solid #ff9d1c;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
        }
        .time-text {
            font-size: 17px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0px 0px 4px #ff9d00;
            letter-spacing: 0.5px;
        }

        /* ⚠️ 各種警告色カラーコード定義（環境省準拠） */
        .bg-safe      { background: linear-gradient(135deg, #005bac 0%, #003366 100%); }
        .bg-attention { background: linear-gradient(135deg, #3fa9f5 0%, #0071bc 100%); }
        .bg-warning   { background: linear-gradient(135deg, #fff200 0%, #d4c500 100%); }
        .bg-severe    { background: linear-gradient(135deg, #f7931e 0%, #d37200 100%); }
        .bg-danger    { background: linear-gradient(135deg, #f15a24 0%, #c1272d 100%); }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🔄 側面1〜4面：無限ローテーションウインドウ -->
        <div class="sides-window">
            <div class="sides-track" id="sidesTrack">
                <!-- JavaScriptにより、ここに1面〜4面のデータパネル（およびシームレス用クローン）が自動生成されます -->
            </div>
        </div>

        <!-- 📦 上面ロゴ：右端に常に完全固定 -->
        <div class="logo-pane">
            <img id="logoImg" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="現場ロゴ">
        </div>
    </div>

    <script>
        // 🛠️ URLパラメータの取得（一切の変更なし。従来仕様を完全踏襲）
        const urlParams = new URLSearchParams(window.location.search);
        const corpID = urlParams.get('CorpID') || 'default';
        const loID = urlParams.get('LoID') || 'default';
        const ext = urlParams.get('Ext') || 'png';
        const testMode = urlParams.get('test'); // ?test=danger 等のデバッグ機能

        // データの保存先JSONとロゴ画像のパス設定
        const jsonPath = `data/${corpID}/${loID}.json`;
        const logoPath = `logos/${corpID}/${loID}_logo.${ext}`;

        // ロゴ画像の読み込み
        document.getElementById('logoImg').src = logoPath;

        // 側面4面のデータ構造定義
        const metrics = [
            { id: 'shitu', title: '現場湿度', unit: '%' },
            { id: 'wbgt', title: '暑さ指数', unit: '℃' },
            { id: 'kion', title: '現場気温', unit: '℃' },
            { id: 'koku', title: '黒球温度', unit: '℃' }
        ];

        // 🔔 警戒レベルに応じた配色・文言・顔文字の判定ロジック
        function getAlertConfig(wbgtValue) {
            const val = parseFloat(wbgtValue);
            if (val >= 32.1) {
                return { className: 'bg-danger', text: '危険', icon: '🚨' };
            } else if (val >= 29.1) {
                return { className: 'bg-severe', text: '厳重警戒', icon: '😷' };
            } else if (val >= 26.1) {
                return { className: 'bg-warning', text: '警戒', icon: '⚠️' };
            } else if (val >= 22.1) {
                return { className: 'bg-attention', text: '注意', icon: '💧' };
            } else {
                return { className: 'bg-safe', text: 'ほぼ安全', icon: '🌿' };
            }
        }

        // 🔄 シームレスな無限ループトラックの構築
        const track = document.getElementById('sidesTrack');
        let currentStep = 0;
        const paneWidth = 128;
        const totalOriginalPanes = 4;

        function buildCarousel(data, alertConfig) {
            track.innerHTML = '';
            
            // 無限ループを物理的に繋げるため、オリジナル4面の前後に「バッファ（複製）」を結合
            // [後方クローン(2面)] + [オリジナル4面(1,2,3,4)] + [前方クローン(4面)]
            const renderList = [];
            
            // 後方クローン (最後尾の2つを先頭の前に配置)
            renderList.push(metrics[2], metrics[3]);
            // オリジナル4面
            renderList.push(...metrics);
            // 前方クローン (先頭から4つを後ろに配置)
            renderList.push(...metrics);

            renderList.forEach((metric) => {
                const pane = document.createElement('div');
                pane.className = `pane ${alertConfig.className}`;
                
                // 値の取得とディフェンス
                let value = data[metric.id] !== undefined ? data[metric.id] : '0.0';
                if (metric.id === 'shitu' && value.includes('.')) {
                    value = Math.round(parseFloat(value)).toString();
                }

                pane.innerHTML = `
                    <div class="pane-title">${metric.title}</div>
                    <div class="value-container">
                        <span class="pane-value">${value}</span>
                        <span class="pane-unit">${metric.unit}</span>
                    </div>
                    <div class="status-container">
                        <span class="status-text">${alertConfig.icon} ${alertConfig.text}</span>
                    </div>
                    <div class="time-banner">
                        <span class="time-text" data-time="true">00/00 00:00</span>
                    </div>
                `;
                track.appendChild(pane);
            });

            // 初期位置をオリジナルの「第1面（現場湿度）」に正確に合わせる
            // 前前に2枚クローンがあるため、初期座標は左に2枚分ずらした位置
            currentStep = 2; 
            updateTrackPosition(false);
            updateTimestamps();
        }

        // 座標移動のアニメーション制御
        function updateTrackPosition(animate = true) {
            if (animate) {
                track.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
            } else {
                track.style.transition = 'none';
            }
            track.style.transform = `translateX(${-currentStep * paneWidth}px)`;
        }

        // 5秒ごとに1面ずつ左に流すロジック（境目のループ処理）
        function nextSlide() {
            currentStep++;
            updateTrackPosition(true);

            // オリジナルの4面を通り過ぎて、前方クローンの「現場気温」に達した瞬間
            if (currentStep === 2 + totalOriginalPanes) {
                setTimeout(() => {
                    currentStep = 2; // 瞬時にオリジナルの「現場湿度」へ座標をワープ（アニメーションなし）
                    updateTrackPosition(false);
                }, 600); // 0.6秒のスライド作動直後に実行
            }
        }

        // 下段の時計更新（お写真の「MM/DD HH:mm」フォーマットを完全再現）
        function updateTimestamps() {
            const now = new Date();
            const MM = String(now.getMonth() + 1).padStart(2, '0');
            const DD = String(now.getDate()).padStart(2, '0');
            const HH = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const timeStr = `${MM}/${DD} ${HH}:${mm}`;

            document.querySelectorAll('[data-time="true"]').forEach(el => {
                el.textContent = timeStr;
            });
        }

        // 🌐 データの非同期読み込み関数（10秒ごとに自動更新）
        async function fetchLatestData() {
            try {
                let data = {};
                
                if (testMode) {
                    // テストモード用ダミーデータ
                    data = { wbgt: '29.2', kion: '30.1', koku: '35.8', shitu: '73' };
                    if (testMode === 'danger') data.wbgt = '32.5';
                    if (testMode === 'warning') data.wbgt = '26.5';
                    if (testMode === 'attention') data.wbgt = '23.0';
                    if (testMode === 'safe') data.wbgt = '20.0';
                } else {
                    // 本番環境：GitHub Pages上の最新JSONデータを取得（キャッシュ回避付き）
                    const res = await fetch(`${jsonPath}?r=${new Date().getTime()}`);
                    if (!res.ok) throw new Error('Data fetch failed');
                    data = await res.json();
                }

                const alertConfig = getAlertConfig(data.wbgt);
                buildCarousel(data, alertConfig);

            } catch (error) {
                console.error('データ取得エラー:', error);
                // エラー時のフォールバック表示
                const alertConfig = getAlertConfig('0.0');
                buildCarousel({ wbgt: '0.0', kion: '0.0', koku: '0.0', shitu: '0' }, alertConfig);
            }
        }

        // 🚀 各種タイマーの初期化と起動
        fetchLatestData();                     // 初回データ読み込み
        setInterval(fetchLatestData, 10000);   // 10秒ごとに最新JSONを監視
        setInterval(updateTimestamps, 10000);  // 10秒ごとに時計を更新
        setInterval(nextSlide, 5000);          // 5秒ごとに側面をシームレスに1面スライド
    </script>
</body>
</html>
