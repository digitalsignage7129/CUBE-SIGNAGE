<style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 640x128 絶対固定サイズ */
        .signage-container {
            display: flex;
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            min-height: 128px !important;
            max-height: 128px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 128px正方形ブロック */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important;
            height: 128px !important;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            padding: 6px 3px 4px 3px; /* 上下の余白を最適化 */
            text-align: center;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Arial Black', 'Impact', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden;
        }
        .block:last-child {
            border-right: none;
        }

        /* 【上段】項目ラベル：サイズアップ＋純白＋極太化 */
        .label {
            font-size: 12px; /* 10pxから12pxへ拡大 */
            font-weight: 900;
            color: #FFFFFF !important; /* グレーを廃止し純白に固定 */
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: -0.5px; /* 横にハミ出さないよう微調整 */
            text-shadow: 1px 1px 0px #000000; /* LEDの光にじみ防止 */
        }
        .text-dark { color: #000000 !important; text-shadow: none !important; }

        /* 【上段と中段の間】切り抜いた顔写真エリア */
        .avatar-box {
            width: 100%;
            height: 44px; /* 42pxから44pxへわずかに拡大 */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
            overflow: hidden;
        }
        .avatar-img {
            height: 100%;
            width: auto;
            object-fit: contain;
            border-radius: 50%;
            filter: brightness(1.65) drop-shadow(0px 1px 1px rgba(0,0,0,0.8)); /* キャラをクッキリ浮き立たせる */
        }
        .no-filter {
            filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.8)) !important;
        }

        /* 【中段】数値表示：圧倒的王者の太さ */
        .value-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1.0;
            margin-top: 1px;
            margin-bottom: 2px;
        }
        .value {
            font-size: 34px; /* 32pxから34pxへ最大化 */
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-weight: 900;
            line-height: 1.0;
            letter-spacing: -1px;
        }
        .unit {
            font-size: 13px;
            font-weight: 900;
            margin-left: 1px;
            line-height: 1.0;
        }

        /* 【下段】文言 ＋ 時計エリアのレイアウト大改造 */
        .bottom-row {
            display: flex;
            justify-content: center; /* 中央寄せベースに変更 */
            align-items: center;
            width: 100%; /* 横幅いっぱいに使って文字サイズを稼ぐ */
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 2px;
            height: 22px; /* 18pxから22pxへ縦幅を拡張 */
            position: relative;
        }
        .bottom-dark {
            background-color: rgba(255, 255, 255, 0.5) !important;
        }
        
        /* 警戒文言：主役として中央にデカデカと配置 */
        .status-text {
            font-size: 14px; /* 11pxから14pxへ大幅サイズアップ！ */
            font-weight: 900;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: 0.5px;
        }
        
        /* 時計：右下隅に極太の最小サイズで配置（生存確認用） */
        .time-stamp {
            position: absolute;
            right: 3px;
            bottom: 2px;
            font-size: 8px; /* 認識できる限界まで小さく */
            font-family: 'Arial Black', monospace;
            font-weight: 900; /* 極太化 */
            white-space: nowrap;
            line-height: 1.0;
            color: #FFFFFF !important; /* 純白 */
            opacity: 0.8; /* 主役の文言を邪魔しないようわずかに透過 */
        }
        .time-dark { color: #000000 !important; }
        .time-light { color: #FFFFFF !important; }

        /* ⑤ ロゴ */
        #block-logo {
            padding: 0 !important; 
            background-color: #000000 !important;
            justify-content: center;
            align-items: center;
        }
        .logo-wrapper {
            width: 128px !important;
            height: 128px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
