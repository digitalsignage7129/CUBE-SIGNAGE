<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>環境モニター サイネージ（現場安全掲示板仕様）</title>
    <style>
        /* 画面全体の初期化 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 640x128 絶対固定サイズ */
        .signage-container {
            display: flex;
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            min-height: 128px !important;
            max-height: 128px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 各ブロック：128px × 128px の完全正方形 */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important;
            height: 128px !important;
            border-right: 1px solid #333333;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            padding: 6px 3px; 
            text-align: center;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden;
        }
        .block:last-child {
            border-right: none;
        }

        /* 項目タイトル */
        .label {
            font-size: 11px;
            font-weight: bold;
            color: #AAAAAA;
            white-space: nowrap;
            line-height: 1.0;
        }
        .text-dark { color: #111111 !important; }
        .text-light { color: #AAAAAA !important; }

        /* 数値表示エリア */
        .value-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .value-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1.0;
        }
        .value {
            font-size: 38px; /* 数値を単独で最大サイズに強調 */
            font-family: 'Arial Black', sans-serif;
            line-height: 1.0;
            font-weight: bold;
        }
        .unit {
            font-size: 14px;
            margin-left: 1px;
            line-height: 1.0;
        }

        /* 最下部：現場安全掲示板風の「太字の警告ステータス」と時計 */
        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 96%;
            margin: 0 auto;
            background-color: rgba(17, 17, 17, 0.8);
            padding: 2px 5px;
            border-radius: 3px;
            height: 20px;
        }
        .bottom-dark {
            background-color: rgba(0, 0, 0, 0.2) !important;
        }
        /* 「注意」「厳重警戒」などの現場テキスト強調 */
        .status-text {
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: 0.5px;
        }
        /* 1秒ごとに進むリアルタイム時計 */
        .time-stamp {
            font-size: 9px;
            font-family: monospace;
            white-space: nowrap;
            line-height: 1.0;
            color: #CCCCCC;
        }
        .time-dark { color: #111111 !important; }
        .time-light { color: #CCCCCC !important; }

        /* ⑤ ロゴ専用エリア */
        #block-logo {
            padding: 0 !important; 
            background-color: #000000 !important;
            justify-content: center;
            align-items: center;
        }
        .logo-wrapper {
            width: 128px !important;
            height: 128px !important;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block data-block">
            <div class="label data-label">暑さ指数 (WBGT)</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
                </div>
            </div>
            <div class="bottom-row" id="bottom-wbgt">
                <span class="status-text" id="status-wbgt">――</span>
                <span class="time-stamp data-time" id="time-wbgt">00:00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">気温</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
                </div>
            </div>
            <div class="bottom-row" id="bottom-kion">
                <span class="status-text" id="status-kion">――</span>
                <span class="time-stamp data-time" id="time-kion">00:00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">黒球温度</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
                </div>
            </div>
            <div class="bottom-row" id="bottom-koku">
                <span class="status-text" id="status-koku">――</span>
                <span class="time-stamp data-time" id="time-koku">00:00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">湿度</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
                </div>
            </div>
            <div class="bottom-row" id="bottom-shitu">
                <span class="status-text" id="status-shitu">――</span>
                <span class="time-stamp data-time" id="time-shitu">00:00:00</span>
            </div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        const baseUrl = 'https://www2.edam.ne.jp/Json/WBGTNumData/2452';

        // 時計機能（1秒ごとに画面の秒数を進める）
        function updateClock() {
            const now = new Date();
            const hrs = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const secs = String(now.getSeconds()).padStart(2, '0');
            const timeString = `${hrs}:${mins}:${secs}`;

            document.querySelectorAll('.data-time').forEach(el => {
                el.textContent = timeString;
            });
        }

        // データを取得して数値と警告色を変える関数（10秒おき）
        async function updateSignageData() {
            try {
                const timeStamp = new Date().getTime();
                const targetUrl = baseUrl + '?r=' + timeStamp;
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) + '&nocache=' + timeStamp;

                const response = await fetch(proxyUrl, {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (!response.ok) throw new Error('データ取得エラー');
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const current = data[0];
                    const wbgtVal = current.Wbgt ? Number(current.Wbgt) : 0;

                    // 画面中央にそれぞれの数値を反映
                    document.getElementById('val-wbgt').textContent = current.Wbgt ? wbgtVal.toFixed(1) : '--.-';
                    document.getElementById('val-kion').textContent = current.Kion ? Number(current.Kion).toFixed(1) : '--.-';
                    document.getElementById('val-koku').textContent = current.Koku ? Number(current.Koku).toFixed(1) : '--.-';
                    document.getElementById('val-shitu').textContent = current.Shitu ? Number(current.Shitu).toFixed(1) : '--.-';

                    // 元サイト画像の5段階基準値・カラーを完全再現
                    let bgColor = '#4A6B75';       // ほぼ安全（22℃未満）
                    let textColor = '#FFFFFF';
                    let labelColorClass = 'text-light';
                    let isDark = false;
                    let txt = 'ほぼ安全';

                    if (current.Wbgt) {
                        if (wbgtVal >= 32.0) {
                            bgColor = '#FF3333';   // 危険（赤）
                            txt = '危　険';
                        } else if (wbgtVal >= 29.0) {
                            bgColor = '#D47A2A';   // 厳重警戒（オレンジ）
                            txt = '厳重警戒';
                        } else if (wbgtVal >= 26.0) {
                            bgColor = '#88A848';   // 警戒（黄緑/オレンジ中間）
                            txt = '警　戒';
                        } else if (wbgtVal >= 22.0) {
                            bgColor = '#99FF66';   // 注意（明るい黄緑）
                            textColor = '#111111'; // 黒文字化
                            labelColorClass = 'text-dark';
                            isDark = true;
                            txt = '注　意';
                        }
                    }

                    // 下部ステータス文字の更新
                    document.getElementById('status-wbgt').textContent = txt;
                    document.getElementById('status-kion').textContent = txt;
                    document.getElementById('status-koku').textContent = txt;
                    document.getElementById('status-shitu').textContent = txt;

                    // 各ブロックへ背景色と文字色を適用
                    document.querySelectorAll('.data-block').forEach(b => {
                        b.style.backgroundColor = bgColor;
                        b.style.color = textColor;
                    });

                    // タイトルラベルの色切り替え
                    document.querySelectorAll('.data-label').forEach(l => {
                        l.className = 'label data-label ' + labelColorClass;
                    });

                    // 下部時計エリアの背景と文字色の微調整
                    document.querySelectorAll('.bottom-row').forEach(row => {
                        if (isDark) {
                            row.classList.add('bottom-dark');
                        } else {
                            row.classList.remove('bottom-dark');
                        }
                    });
                    document.querySelectorAll('.data-time').forEach(t => {
                        t.className = 'time-stamp data-time ' + (isDark ? 'time-dark' : 'time-light');
                    });
                }
            } catch (error) {
                console.error('データ同期失敗:', error);
            }
        }

        // 最初の時計起動と1秒ごとの更新設定
        updateClock();
        setInterval(updateClock, 1000);

        // 最初のデータ取得と10秒ごとの裏更新設定
        updateSignageData();
        setInterval(updateSignageData, 10000); 
    </script>
</body>
</html>
