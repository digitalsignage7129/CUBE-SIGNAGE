<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>WBGT環境モニター（現場公式PNG連動版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 640x128 絶対固定サイズ */
        .signage-container {
            display: flex;
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            min-height: 128px !important;
            max-height: 128px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 128px正方形ブロック */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important;
            height: 128px !important;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            padding: 5px 2px; 
            text-align: center;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden;
        }
        .block:last-child {
            border-right: none;
        }

        /* 項目ラベル */
        .label {
            font-size: 10px;
            font-weight: bold;
            color: #AAAAAA;
            white-space: nowrap;
            line-height: 1.0;
        }
        .text-dark { color: #111111 !important; }
        .text-light { color: #AAAAAA !important; }

        /* 【上段】切り抜いた顔写真エリア */
        .avatar-box {
            width: 100%;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
            overflow: hidden;
        }
        .avatar-img {
            height: 100%;
            width: auto;
            object-fit: contain;
            border-radius: 50%; /* 丸く綺麗に切り抜き */
            /* 暗いPNG画像（1,2,3,5）の明るさを引き上げて緑(4)と同等の鮮やかさに自動補正 */
            filter: brightness(1.65); 
        }
        /* 4.png（注意）は最初から明るいので、二重に明るくならないよう補正をオフ */
        .no-filter {
            filter: none !important;
        }

        /* 【中段】数値表示 */
        .value-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1.0;
            margin-top: -1px;
        }
        .value {
            font-size: 32px;
            font-family: 'Arial Black', sans-serif;
            font-weight: bold;
            line-height: 1.0;
        }
        .unit {
            font-size: 12px;
            margin-left: 1px;
            line-height: 1.0;
        }

        /* 【下段】文言 ＋ 時計 */
        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 96%;
            margin: 0 auto;
            background-color: rgba(0, 0, 0, 0.4);
            padding: 1px 4px;
            border-radius: 2px;
            height: 18px;
        }
        .bottom-dark {
            background-color: rgba(255, 255, 255, 0.4) !important;
        }
        .status-text {
            font-size: 11px;
            font-weight: 900;
            white-space: nowrap;
            line-height: 1.0;
        }
        .time-stamp {
            font-size: 9px;
            font-family: monospace;
            white-space: nowrap;
            line-height: 1.0;
            color: #DDDDDD;
        }
        .time-dark { color: #111111 !important; }
        .time-light { color: #DDDDDD !important; }

        /* ⑤ ロゴ */
        #block-logo {
            padding: 0 !important; 
            background-color: #000000 !important;
            justify-content: center;
            align-items: center;
        }
        .logo-wrapper {
            width: 128px !important;
            height: 128px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block data-block">
            <div class="label data-label">暑さ指数 (WBGT)</div>
            <div class="avatar-box"><img src="5.png" id="img-wbgt" class="avatar-img" alt="顔"></div>
            <div class="value-container">
                <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
            </div>
            <div class="bottom-row" id="bottom-wbgt">
                <span class="status-text" id="status-wbgt">――</span>
                <span class="time-stamp data-time">00:00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">気温</div>
            <div class="avatar-box"><img src="5.png" id="img-kion" class="avatar-img" alt="顔"></div>
            <div class="value-container">
                <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
            </div>
            <div class="bottom-row" id="bottom-kion">
                <span class="status-text" id="status-kion">――</span>
                <span class="time-stamp data-time">00:00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">黒球温度</div>
            <div class="avatar-box"><img src="5.png" id="img-koku" class="avatar-img" alt="顔"></div>
            <div class="value-container">
                <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
            </div>
            <div class="bottom-row" id="bottom-koku">
                <span class="status-text" id="status-koku">――</span>
                <span class="time-stamp data-time">00:00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">湿度</div>
            <div class="avatar-box"><img src="5.png" id="img-shitu" class="avatar-img" alt="顔"></div>
            <div class="value-container">
                <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
            </div>
            <div class="bottom-row" id="bottom-shitu">
                <span class="status-text" id="status-shitu">――</span>
                <span class="time-stamp data-time">00:00:00</span>
            </div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        const baseUrl = 'https://www2.edam.ne.jp/Json/WBGTNumData/2452';

        function updateClock() {
            const now = new Date();
            const timeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            document.querySelectorAll('.data-time').forEach(el => el.textContent = timeString);
        }

        async function updateSignageData() {
            try {
                const timeStamp = new Date().getTime();
                const targetUrl = baseUrl + '?r=' + timeStamp;
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) + '&nocache=' + timeStamp;

                const response = await fetch(proxyUrl, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                if (!response.ok) throw new Error('通信エラー');
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const current = data[0];
                    const wbgtVal = current.Wbgt ? Number(current.Wbgt) : 0;

                    document.getElementById('val-wbgt').textContent = current.Wbgt ? wbgtVal.toFixed(1) : '--.-';
                    document.getElementById('val-kion').textContent = current.Kion ? Number(current.Kion).toFixed(1) : '--.-';
                    document.getElementById('val-koku').textContent = current.Koku ? Number(current.Koku).toFixed(1) : '--.-';
                    document.getElementById('val-shitu').textContent = current.Shitu ? Number(current.Shitu).toFixed(1) : '--.-';

                    // 正しい背景色の抽出
                    let bgColor = '#4D666D';       // ほぼ安全
                    let textColor = '#FFFFFF';
                    let labelColorClass = 'text-light';
                    let isDark = false;
                    let txt = 'ほぼ安全';
                    let imgFile = '5.png';         // 拡張子を.pngに変更
                    let useFilter = true;          

                    if (current.Wbgt) {
                        if (wbgtVal >= 32.0) {
                            bgColor = '#A63A3A';   // 危険
                            txt = '危　険';
                            imgFile = '1.png';
                        } else if (wbgtVal >= 29.0) {
                            bgColor = '#7C3E1E';   // 厳重警戒
                            txt = '厳重警戒';
                            imgFile = '2.png';
                        } else if (wbgtVal >= 26.0) {
                            bgColor = '#B7732D';   // 警戒
                            txt = '警　戒';
                            imgFile = '3.png';
                        } else if (wbgtVal >= 22.0) {
                            bgColor = '#C4F941';   // 注意
                            textColor = '#111111'; 
                            labelColorClass = 'text-dark';
                            isDark = true;
                            txt = '注　意';
                            imgFile = '4.png';
                            useFilter = false;     // 4.pngは明るさ補正しない
                        }
                    }

                    // 各ブロックの画像・テキスト・色の更新
                    const imgIds = ['img-wbgt', 'img-kion', 'img-koku', 'img-shitu'];
                    imgIds.forEach(id => {
                        const imgEl = document.getElementById(id);
                        imgEl.src = imgFile;
                        if (useFilter) {
                            imgEl.classList.remove('no-filter');
                        } else {
                            imgEl.classList.add('no-filter');
                        }
                    });

                    document.getElementById('status-wbgt').textContent = txt;
                    document.getElementById('status-kion').textContent = txt;
                    document.getElementById('status-koku').textContent = txt;
                    document.getElementById('status-shitu').textContent = txt;

                    document.querySelectorAll('.data-block').forEach(b => {
                        b.style.backgroundColor = bgColor;
                        b.style.color = textColor;
                    });
                    document.querySelectorAll('.data-label').forEach(l => {
                        l.className = 'label data-label ' + labelColorClass;
                    });

                    document.querySelectorAll('.bottom-row').forEach(row => {
                        if (isDark) {
                            row.classList.add('bottom-dark');
                        } else {
                            row.classList.remove('bottom-dark');
                        }
                    });
                    document.querySelectorAll('.data-time').forEach(t => {
                        t.className = 'time-stamp data-time ' + (isDark ? 'time-dark' : 'time-light');
                    });
                }
            } catch (error) {
                console.error('データ更新失敗:', error);
            }
        }

        updateClock();
        setInterval(updateClock, 1000);

        updateSignageData();
        setInterval(updateSignageData, 10000); 
    </script>
</body>
</html>
