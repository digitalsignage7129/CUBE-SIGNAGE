<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>WBGT環境モニター（限界突破版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 640x128 絶対固定サイズ */
        .signage-container {
            display: flex;
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            min-height: 128px !important;
            max-height: 128px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 128px正方形ブロック */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important;
            height: 128px !important;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            padding: 2px 2px 0px 2px; /* 上下の無駄な隙間をゼロへ */
            text-align: center;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Arial Black', 'Impact', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden;
        }
        .block:last-child {
            border-right: none;
        }

        /* 【上段】項目ラベル：隙間を詰めてガッツリ巨大化 */
        .label {
            font-size: 17px; /* 16pxから17pxへ拡大！ */
            font-weight: 900;
            color: #FFFFFF !important;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: -0.5px;
            text-shadow: 1px 1px 0px #000000;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }
        .text-dark { color: #000000 !important; text-shadow: none !important; }

        /* 【中段・上】数値：デッドスペースを消して圧倒的な巨体（42px）へ */
        .value-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 0.9;
            margin-top: -2px; 
        }
        .value {
            font-size: 42px; /* 34pxから42pxへ驚異の超最大化！ */
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -1.5px;
        }
        .unit {
            font-size: 14px;
            font-weight: 900;
            margin-left: 1px;
            line-height: 0.9;
        }

        /* 【中段・下】お引越ししてきた「顔文字＋文言」の合体ステージ */
        .status-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px; /* 隙間を広げて見やすく */
            width: 100%;
            height: 22px;
            margin-top: -1px;
            margin-bottom: 2px;
        }

        /* 顔写真（中段に合わせたジャストサイズ） */
        .avatar-box {
            width: 20px; /* 16pxから20pxへ拡大！ */
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .avatar-img {
            height: 100%;
            width: 100%;
            object-fit: contain;
            border-radius: 50%;
            filter: brightness(1.65) drop-shadow(0px 1px 1px rgba(0,0,0,0.8));
        }
        .no-filter {
            filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.8)) !important;
        }
        
        /* 警戒文言（注意など）：中段でデカデカと自己主張 */
        .status-text {
            font-size: 18px; /* 16pxから18pxへ超拡大！ */
            font-weight: 900;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: 0.5px;
        }
        
        /* 【下段】時計専用の独立ブラックベルト（縦幅に余裕を確保） */
        .bottom-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            height: 26px; /* 24pxから26pxに広げて文字潰れを完全防止 */
        }
        .bottom-dark {
            background-color: rgba(255, 255, 255, 0.5) !important;
        }

        /* 時計（日付＋時間）：128ピッチの横幅いっぱいに極太発光 */
        .time-stamp {
            font-size: 16px; /* 13pxから16pxへ究極の大サイズ化！ */
            font-family: 'Arial Black', 'Impact', monospace;
            font-weight: 900;
            white-space: nowrap;
            line-height: 1.0;
            color: #FFFFFF !important;
            text-shadow: 1px 1px 0px #000000;
            letter-spacing: 0.2px;
        }
        .time-dark { color: #000000 !important; text-shadow: none !important; }
        .time-light { color: #FFFFFF !important; }

        /* ⑤ ロゴ */
        #block-logo {
            padding: 0 !important; 
            background-color: #000000 !important;
            justify-content: center;
            align-items: center;
        }
        .logo-wrapper {
            width: 128px !important;
            height: 128px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block data-block">
            <div class="label data-label">暑さ指数</div>
            <div class="value-container">
                <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
            </div>
            <div class="status-area">
                <div class="avatar-box"><img src="5.png" id="img-wbgt" class="avatar-img" alt="顔"></div>
                <span class="status-text" id="status-wbgt">――</span>
            </div>
            <div class="bottom-row" id="bottom-wbgt">
                <span class="time-stamp data-time">00/00 00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">現場気温</div>
            <div class="value-container">
                <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
            </div>
            <div class="status-area">
                <div class="avatar-box"><img src="5.png" id="img-kion" class="avatar-img" alt="顔"></div>
                <span class="status-text" id="status-kion">――</span>
            </div>
            <div class="bottom-row" id="bottom-kion">
                <span class="time-stamp data-time">00/00 00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">黒球温度</div>
            <div class="value-container">
                <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
            </div>
            <div class="status-area">
                <div class="avatar-box"><img src="5.png" id="img-koku" class="avatar-img" alt="顔"></div>
                <span class="status-text" id="status-koku">――</span>
            </div>
            <div class="bottom-row" id="bottom-koku">
                <span class="time-stamp data-time">00/00 00:00</span>
            </div>
        </div>

        <div class="block data-block">
            <div class="label data-label">現場湿度</div>
            <div class="value-container">
                <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
            </div>
            <div class="status-area">
                <div class="avatar-box"><img src="5.png" id="img-shitu" class="avatar-img" alt="顔"></div>
                <span class="status-text" id="status-shitu">――</span>
            </div>
            <div class="bottom-row" id="bottom-shitu">
                <span class="time-stamp data-time">00/00 00:00</span>
            </div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const corpId = urlParams.get('CorpID') || '18016';
        const loId = urlParams.get('LoID') || '2480';

        const dataUrl = `data/${corpId}/${loId}.json`;

        function updateClock() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const timeString = `${month}/${date} ${hours}:${minutes}`;
            document.querySelectorAll('.data-time').forEach(el => el.textContent = timeString);
        }

        async function updateSignageData() {
            try {
                const timeStamp = new Date().getTime();
                const response = await fetch(`${dataUrl}?r=${timeStamp}`, { cache: 'no-store' });
                if (!response.ok) throw new Error('データ通信エラー');
                
                const data = await response.json();
                
                // 暑さ指数が(WBGT)のままだと横幅が足りずハミ出るため、「暑さ指数」の4文字にスッキリ修正
                document.getElementById('val-wbgt').textContent = data.wbgt !== "0.0" ? Number(data.wbgt).toFixed(1) : '--.-';
                document.getElementById('val-kion').textContent = data.kion !== "0.0" ? Number(data.kion).toFixed(1) : '--.-';
                document.getElementById('val-koku').textContent = data.koku !== "0.0" ? Number(data.koku).toFixed(1) : '--.-';
                document.getElementById('val-shitu').textContent = data.shitu !== "0" ? Number(data.shitu).toFixed(0) : '--';

                const themeMap = {
                    'danger':    { bg: '#A63A3A', text: '#FFFFFF', txt: '危 険',    img: '1.png', dark: false, filter: true },
                    'severe':    { bg: '#7C3E1E', text: '#FFFFFF', txt: '厳重警戒',  img: '2.png', dark: false, filter: true },
                    'warning':   { bg: '#B7732D', text: '#FFFFFF', txt: '警 戒',    img: '3.png', dark: false, filter: true },
                    'attention': { bg: '#C4F941', text: '#000000', txt: '注 意',    img: '4.png', dark: true,  filter: false },
                    'safe':      { bg: '#4D666D', text: '#FFFFFF', txt: 'ほぼ安全',  img: '5.png', dark: false, filter: true }
                };

                const theme = themeMap[data.level] || themeMap['safe'];

                const imgIds = ['img-wbgt', 'img-kion', 'img-koku', 'img-shitu'];
                imgIds.forEach(id => {
                    const imgEl = document.getElementById(id);
                    if (imgEl) {
                        imgEl.src = theme.img;
                        if (theme.filter) {
                            imgEl.classList.remove('no-filter');
                        } else {
                            imgEl.classList.add('no-filter');
                        }
                    }
                });

                document.getElementById('status-wbgt').textContent = theme.txt;
                document.getElementById('status-kion').textContent = theme.txt;
                document.getElementById('status-koku').textContent = theme.txt;
                document.getElementById('status-shitu').textContent = theme.txt;

                document.querySelectorAll('.data-block').forEach(b => {
                    b.style.backgroundColor = theme.bg;
                    b.style.color = theme.text;
                });

                document.querySelectorAll('.data-label').forEach(l => {
                    if (theme.dark) {
                        l.classList.add('text-dark');
                    } else {
                        l.classList.remove('text-dark');
                    }
                });

                document.querySelectorAll('.bottom-row').forEach(row => {
                    if (theme.dark) {
                        row.classList.add('bottom-dark');
                    } else {
                        row.classList.remove('bottom-dark');
                    }
                });

                document.querySelectorAll('.data-time').forEach(t => {
                    if (theme.dark) {
                        t.className = 'time-stamp data-time time-dark';
                    } else {
                        t.className = 'time-stamp data-time time-light';
                    }
                });

            } catch (error) {
                console.error('データ読み込み失敗:', error);
            }
        }

        updateClock();
        setInterval(updateClock, 1000);

        updateSignageData();
        setInterval(updateSignageData, 10000);
    </script>
</body>
</html>
