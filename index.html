<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>環境モニター サイネージ（640x128絶対固定版）</title>
    <style>
        /* 画面全体の初期化 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* 💡 画面全体がどうであれ、背景は完全な黒にしてハミ出しを隠す */
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 💡 【今回の核心】サイトのサイズ自体を「横640px × 縦128px」に完全固定！ */
        .signage-container {
            display: flex;
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            min-height: 128px !important;
            max-height: 128px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 各ブロック：128px × 128px の完全な正方形を5つ作る */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important;
            height: 128px !important;
            
            border-right: 1px solid #222222;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 上にタイトル、真ん中に数値、下に時刻 */
            padding: 6px 2px; 
            text-align: center;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow: hidden;
        }
        .block:last-child {
            border-right: none;
        }

        /* 項目タイトル */
        .label {
            font-size: 11px;
            font-weight: bold;
            color: #AAAAAA;
            white-space: nowrap;
            line-height: 1.0;
        }
        .text-dark { color: #111111 !important; }
        .text-light { color: #AAAAAA !important; }

        /* 数値・顔文字エリア（128x128のド真ん中に配置） */
        .value-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .value-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1.0;
        }
        .value {
            font-size: 34px;
            font-family: 'Arial Black', sans-serif;
            line-height: 1.0;
        }
        .unit {
            font-size: 13px;
            margin-left: 1px;
            line-height: 1.0;
        }

        /* 巨大顔文字 */
        .status-emoji {
            font-size: 24px; 
            line-height: 1.0;
            margin-top: 3px;
            display: block;
        }

        /* 最下部：時刻エリア */
        .time-stamp {
            font-size: 10px;
            color: #CCCCCC;
            background-color: #111111;
            padding: 1px 0;
            border-radius: 2px;
            font-family: monospace;
            white-space: nowrap;
            width: 90%;
            margin: 0 auto;
            line-height: 1.1;
        }
        .time-dark {
            background-color: rgba(0,0,0,0.4) !important;
            color: #111111 !important;
        }

        /* ⑤ ロゴ専用エリア（128px×128pxの正方形をフルに使う） */
        #block-logo {
            padding: 0 !important; 
            background-color: #000000 !important;
            justify-content: center;
            align-items: center;
        }
        .logo-wrapper {
            width: 128px !important;
            height: 128px !important;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 正方形の中に最大サイズで綺麗に収める */
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block data-block">
            <div class="label data-label">暑さ指数 (WBGT)</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-wbgt">――</span>
            </div>
            <div class="time-stamp data-time" id="time-wbgt">--:--:--</div>
        </div>

        <div class="block data-block">
            <div class="label data-label">気温</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-kion">――</span>
            </div>
            <div class="time-stamp data-time" id="time-kion">--:--:--</div>
        </div>

        <div class="block data-block">
            <div class="label data-label">黒球温度</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-koku">――</span>
            </div>
            <div class="time-stamp data-time" id="time-koku">--:--:--</div>
        </div>

        <div class="block data-block">
            <div class="label data-label">湿度</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
                </div>
                <span class="status-emoji" id="emoji-shitu">――</span>
            </div>
            <div class="time-stamp data-time" id="time-shitu">--:--:--</div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        const baseUrl = 'https://www2.edam.ne.jp/Json/WBGTNumData/2452';

        async function updateSignageData() {
            try {
                const timeStamp = new Date().getTime();
                const targetUrl = baseUrl + '?r=' + timeStamp;
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) + '&nocache=' + timeStamp;

                const response = await fetch(proxyUrl, {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (!response.ok) throw new Error('ネットワーク応答が正常ではありません');
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const current = data[0];
                    const wbgtVal = current.Wbgt ? Number(current.Wbgt) : 0;

                    // 1. 数値セット
                    document.getElementById('val-wbgt').textContent = current.Wbgt ? wbgtVal.toFixed(1) : '--.-';
                    document.getElementById('val-kion').textContent = current.Kion ? Number(current.Kion).toFixed(1) : '--.-';
                    document.getElementById('val-koku').textContent = current.Koku ? Number(current.Koku).toFixed(1) : '--.-';
                    document.getElementById('val-shitu').textContent = current.Shitu ? Number(current.Shitu).toFixed(1) : '--.-';

                    // 2. 時刻セット（時:分:秒 のみ）
                    let timeString = '――:――';
                    if (current.Time) {
                        const parts = current.Time.split(' ');
                        if (parts.length > 1) {
                            timeString = parts[1];
                        } else {
                            timeString = current.Time;
                        }
                    }
                    document.getElementById('time-wbgt').textContent = timeString;
                    document.getElementById('time-kion').textContent = timeString;
                    document.getElementById('time-koku').textContent = timeString;
                    document.getElementById('time-shitu').textContent = timeString;

                    // 3. アラート定義
                    let bgColor = '#000000';
                    let textColor = '#FFFFFF';
                    let labelColorClass = 'text-light';
                    let timeColorClass = '';
                    let currentEmoji = '――';

                    if (current.Wbgt) {
                        if (wbgtVal >= 31.0) {
                            bgColor = '#880000';
                            currentEmoji = '😭';
                        } else if (wbgtVal >= 28.0) {
                            bgColor = '#A04000';
                            currentEmoji = '😫';
                        } else if (wbgtVal >= 25.0) {
                            bgColor = '#B39200';
                            textColor = '#000000';
                            labelColorClass = 'text-dark';
                            timeColorClass = 'time-dark';
                            currentEmoji = '😐';
                        } else {
                            bgColor = '#003366';
                            currentEmoji = '😊';
                        }
                    }

                    // 4. 各要素への一斉適用
                    const blocks = document.querySelectorAll('.data-block');
                    const labels = document.querySelectorAll('.data-label');
                    const times = document.querySelectorAll('.data-time');
                    const emojis = document.querySelectorAll('.status-emoji');

                    blocks.forEach(b => {
                        b.style.backgroundColor = bgColor;
                        b.style.color = textColor;
                    });

                    labels.forEach(l => {
                        l.className = 'label data-label ' + labelColorClass;
                    });

                    times.forEach(t => {
                        if (timeColorClass) {
                            t.classList.add('time-dark');
                        } else {
                            t.classList.remove('time-dark');
                        }
                    });

                    emojis.forEach(e => {
                        e.textContent = currentEmoji;
                    });
                }
            } catch (error) {
                console.error('データ取得または解析エラー:', error);
            }
        }

        updateSignageData();
        setInterval(updateSignageData, 10000); 
    </script>
</body>
</html>
