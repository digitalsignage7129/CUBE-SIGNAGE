<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>WBGT環境モニター（純粋CSSシームレス・ロゴ透過回転版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 💻 全体コンテナ（640px × 128px 固定） */
        .signage-container {
            display: flex;
            width: 640px !important;
            height: 128px !important;
            min-width: 640px !important;
            max-width: 640px !important;
            background-color: #000000;
            overflow: hidden;
        }

        /* 🔄 側面エリア（512px分の「窓」） */
        .side-stage {
            flex: 0 0 512px !important;
            width: 512px !important;
            height: 128px !important;
            overflow: hidden;
            position: relative;
        }

        /* 🚀 右から左へ流れるトラック（8面分 = 1024px） */
        .scroll-track {
            display: flex;
            width: 1024px !important;
            height: 128px !important;
            will-change: transform;
            animation: seamless-slide 20s infinite;
        }

        /* アニメーション：ステップで右から左へスライド（ピタッ、スッ、ピタッ） */
        @keyframes seamless-slide {
            0%, 20%  { transform: translateX(0px); }
            25%, 45% { transform: translateX(-128px); }
            50%, 70% { transform: translateX(-256px); }
            75%, 95% { transform: translateX(-384px); }
            100%     { transform: translateX(-512px); }
        }

        /* 128px正方形ブロック */
        .block {
            flex: 0 0 128px !important; 
            width: 128px !important;
            height: 128px !important;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            padding: 2px 2px 0px 2px;
            text-align: center;
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Arial Black', 'Impact', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* 項目ラベル */
        .label {
            font-size: 17px;
            font-weight: 900;
            color: #FFFFFF !important;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: -0.5px;
            text-shadow: 1px 1px 0px #000000;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }
        .text-dark { color: #000000 !important; text-shadow: none !important; }

        /* 数値表示 */
        .value-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 0.9;
            margin-top: -2px; 
        }
        .value {
            font-size: 42px;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -1.5px;
        }
        .unit {
            font-size: 14px;
            font-weight: 900;
            margin-left: 1px;
            line-height: 0.9;
        }

        /* 顔文字ステータス */
        .status-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            height: 22px;
            margin-top: -1px;
            margin-bottom: 2px;
        }
        .avatar-box {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .avatar-img {
            height: 100%;
            width: 100%;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.6));
        }
        .status-text {
            font-size: 18px;
            font-weight: 900;
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: 0.5px;
        }
        
        /* 下段時計用ベルト */
        .bottom-row {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            height: 26px;
        }
        .bottom-dark {
            background-color: rgba(0, 0, 0, 0.15) !important;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        .time-stamp {
            font-size: 16px;
            font-family: 'Arial Black', 'Impact', monospace;
            font-weight: 900;
            white-space: nowrap;
            line-height: 1.0;
            letter-spacing: 0.2px;
        }
        .time-dark { color: #000000 !important; text-shadow: none !important; }
        .time-light { color: #FFFFFF !important; text-shadow: 1px 1px 0px #000000; }

        /* 🔝 上面ロゴエリア（512px〜640px）：背景は完全な黒に固定 */
        .logo-block {
            flex: 0 0 128px !important;
            width: 128px !important;
            height: 128px !important;
            padding: 0 !important; 
            background-color: #000000 !important; /* 背景は絶対に黒 */
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 1px solid #1a1a1a;
            position: relative;
            overflow: hidden;
        }
        
        .logo-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrapper img {
            width: 90%; /* 回転時に四隅がハミ出さないように少しだけ縮小 */
            height: 90%;
            object-fit: contain;
            
            /* 💡 画像の黒い背景部分を「透明」にして、赤いロゴマークだけを抽出する処理 */
            mix-blend-mode: screen; 
            
            will-change: transform;
            animation: rotate-logo 20s infinite;
        }

        @keyframes rotate-logo {
            0%, 20%  { transform: rotate(0deg); }
            25%, 45% { transform: rotate(-90deg); }
            50%, 70% { transform: rotate(-180deg); }
            75%, 95% { transform: rotate(-270deg); }
            100%     { transform: rotate(-360deg); }
        }
    </style>
</head>
<body>

    <div class="signage-container">
        
        <!-- 側面4面分の「窓」 -->
        <div class="side-stage">
            <div class="scroll-track">
                
                <!-- 【オリジナル 1〜4面】 -->
                <div class="block data-block">
                    <div class="label data-label">暑さ指数</div>
                    <div class="value-container"><span class="value val-wbgt">--.-</span><span class="unit">℃</span></div>
                    <div class="status-area">
                        <div class="avatar-box"><img src="5.png" class="avatar-img img-wbgt" alt="顔"></div>
                        <span class="status-text status-wbgt">――</span>
                    </div>
                    <div class="bottom-row bottom-wbgt"><span class="time-stamp data-time">00/00 00:00</span></div>
                </div>

                <div class="block data-block">
                    <div class="label data-label">現場気温</div>
                    <div class="value-container"><span class="value val-kion">--.-</span><span class="unit">℃</span></div>
                    <div class="status-area">
                        <div class="avatar-box"><img src="5.png" class="avatar-img img-kion" alt="顔"></div>
                        <span class="status-text status-kion">――</span>
                    </div>
                    <div class="bottom-row bottom-kion"><span class="time-stamp data-time">00/00 00:00</span></div>
                </div>

                <div class="block data-block">
                    <div class="label data-label">黒球温度</div>
                    <div class="value-container"><span class="value val-koku">--.-</span><span class="unit">℃</span></div>
                    <div class="status-area">
                        <div class="avatar-box"><img src="5.png" class="avatar-img img-koku" alt="顔"></div>
                        <span class="status-text status-koku">――</span>
                    </div>
                    <div class="bottom-row bottom-koku"><span class="time-stamp data-time">00/00 00:00</span></div>
                </div>

                <div class="block data-block">
                    <div class="label data-label">現場湿度</div>
                    <div class="value-container"><span class="value val-shitu">--.-</span><span class="unit">%</span></div>
                    <div class="status-area">
                        <div class="avatar-box"><img src="5.png" class="avatar-img img-shitu" alt="顔"></div>
                        <span class="status-text status-shitu">――</span>
                    </div>
                    <div class="bottom-row bottom-shitu"><span class="time-stamp data-time">00/00 00:00</span></div>
                </div>

                <!-- 【ループ用クローン 5〜8面】 -->
                <div class="block data-block">
                    <div class="label data-label">暑さ指数</div>
                    <div class="value-container"><span class="value val-wbgt">--.-</span><span class="unit">℃</span></div>
                    <div class="status-area">
                        <div class="avatar-box"><img src="5.png" class="avatar-img img-wbgt" alt="顔"></div>
                        <span class="status-text status-wbgt">――</span>
                    </div>
                    <div class="bottom-row bottom-wbgt"><span class="time-stamp data-time">00/00 00:00</span></div>
                </div>

                <div class="block data-block">
                    <div class="label data-label">現場気温</div>
                    <div class="value-container"><span class="value val-kion">--.-</span><span class="unit">℃</span></div>
                    <div class="status-area">
                        <div class="avatar-box"><img src="5.png" class="avatar-img img-kion" alt="顔"></div>
                        <span class="status-text status-kion">――</span>
                    </div>
                    <div class="bottom-row bottom-kion"><span class="time-stamp data-time">00/00 00:00</span></div>
                </div>

                <div class="block data-block">
                    <div class="label data-label">黒球温度</div>
                    <div class="value-container"><span class="value val-koku">--.-</span><span class="unit">℃</span></div>
                    <div class="status-area">
                        <div class="avatar-box"><img src="5.png" class="avatar-img img-koku" alt="顔"></div>
                        <span class="status-text status-koku">――</span>
                    </div>
                    <div class="bottom-row bottom-koku"><span class="time-stamp data-time">00/00 00:00</span></div>
                </div>

                <div class="block data-block">
                    <div class="label data-label">現場湿度</div>
                    <div class="value-container"><span class="value val-shitu">--.-</span><span class="unit">%</span></div>
                    <div class="status-area">
                        <div class="avatar-box"><img src="5.png" class="avatar-img img-shitu" alt="顔"></div>
                        <span class="status-text status-shitu">――</span>
                    </div>
                    <div class="bottom-row bottom-shitu"><span class="time-stamp data-time">00/00 00:00</span></div>
                </div>

            </div>
        </div>

        <!-- 上面ロゴ 128px (右端固定) -->
        <div class="logo-block">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const corpId = urlParams.get('CorpID') || '18016';
        const loId = urlParams.get('LoID') || '2480';
        const testParam = urlParams.get('test');
        const dataUrl = `data/${corpId}/${loId}.json`;

        function updateTextByClass(className, text) {
            document.querySelectorAll(className).forEach(el => el.textContent = text);
        }
        function updateSrcByClass(className, src) {
            document.querySelectorAll(className).forEach(el => el.src = src);
        }

        function updateClock() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const timeString = `${month}/${date} ${hours}:${minutes}`;
            updateTextByClass('.data-time', timeString);
        }

        async function updateSignageData() {
            try {
                let wbgtVal = null;
                let data = { kion: "0.0", koku: "0.0", shitu: "0" };
                let forceLevel = null;

                if (testParam) {
                    forceLevel = testParam;
                    if (testParam === 'danger')    { wbgtVal = 33.5; data = { kion: "35.2", koku: "38.0", shitu: "75" }; }
                    if (testParam === 'severe')    { wbgtVal = 30.2; data = { kion: "31.8", koku: "33.5", shitu: "68" }; }
                    if (testParam === 'warning')   { wbgtVal = 27.5; data = { kion: "29.0", koku: "29.5", shitu: "60" }; }
                    if (testParam === 'attention') { wbgtVal = 24.2; data = { kion: "26.1", koku: "25.0", shitu: "55" }; }
                    if (testParam === 'safe')      { wbgtVal = 20.5; data = { kion: "22.0", koku: "21.0", shitu: "48" }; }
                } else {
                    const timeStamp = new Date().getTime();
                    const response = await fetch(`${dataUrl}?r=${timeStamp}`, { cache: 'no-store' });
                    if (!response.ok) throw new Error('データ通信エラー');
                    const jsonData = await response.json();
                    data = jsonData;
                    wbgtVal = data.wbgt !== "0.0" ? Number(data.wbgt) : null;
                }
                
                updateTextByClass('.val-wbgt', wbgtVal !== null ? wbgtVal.toFixed(1) : '--.-');
                updateTextByClass('.val-kion', data.kion !== "0.0" ? Number(data.kion).toFixed(1) : '--.-');
                updateTextByClass('.val-koku', data.koku !== "0.0" ? Number(data.koku).toFixed(1) : '--.-');
                updateTextByClass('.val-shitu', data.shitu !== "0" ? Number(data.shitu).toFixed(0) : '--');

                let levelKey = 'safe';
                if (forceLevel) {
                    levelKey = forceLevel;
                } else if (wbgtVal !== null) {
                    if (wbgtVal >= 32.1) levelKey = 'danger';
                    else if (wbgtVal >= 29.1) levelKey = 'severe';
                    else if (wbgtVal >= 26.1) levelKey = 'warning';
                    else if (wbgtVal >= 22.1) levelKey = 'attention';
                    else levelKey = 'safe';
                }

                const themeMap = {
                    'danger':    { bg: '#FF3333', text: '#FFFFFF', txt: '危 険',    img: '1.png', dark: false },
                    'severe':    { bg: '#FF9933', text: '#FFFFFF', txt: '厳重警戒',  img: '2.png', dark: false },
                    'warning':   { bg: '#FFFF66', text: '#000000', txt: '警 戒',    img: '3.png', dark: true  },
                    'attention': { bg: '#99FF99', text: '#000000', txt: '注 意',    img: '4.png', dark: true  },
                    'safe':      { bg: '#99FFFF', text: '#000000', txt: 'ほぼ安全',  img: '5.png', dark: true  }
                };

                const theme = themeMap[levelKey];

                ['.img-wbgt', '.img-kion', '.img-koku', '.img-shitu'].forEach(cls => updateSrcByClass(cls, theme.img));
                ['.status-wbgt', '.status-kion', '.status-koku', '.status-shitu'].forEach(cls => updateTextByClass(cls, theme.txt));

                document.querySelectorAll('.data-block').forEach(b => {
                    b.style.backgroundColor = theme.bg;
                    b.style.color = theme.text;
                });

                document.querySelectorAll('.data-label').forEach(l => {
                    if (theme.dark) l.classList.add('text-dark');
                    else l.classList.remove('text-dark');
                });

                document.querySelectorAll('.bottom-row').forEach(row => {
                    if (theme.dark) row.classList.add('bottom-dark');
                    else row.classList.remove('bottom-dark');
                });

                document.querySelectorAll('.data-time').forEach(t => {
                    t.className = theme.dark ? 'time-stamp data-time time-dark' : 'time-stamp data-time time-light';
                });

            } catch (error) {
                console.error('データ読み込み失敗:', error);
            }
        }

        updateClock();
        setInterval(updateClock, 1000);

        updateSignageData();
        setInterval(updateSignageData, 10000);
    </script>
</body>
</html>
