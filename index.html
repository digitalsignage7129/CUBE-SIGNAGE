<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Expires" content="0">
    <title>環境モニター サイネージ（実機キャッシュ貫通版）</title>
    <style>
        /* 画面全体の初期化 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        /* 5分割コンテナ */
        .signage-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 20%完全固定スタイル */
        .block {
            flex: 0 0 20%; 
            width: 20%;
            max-width: 20%;
            min-width: 20%;
            height: 100%;
            border-right: 2px solid #222222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4vh 1vw;
            text-align: center;
            background-color: #000000;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .block:last-child {
            border-right: none;
        }

        /* 項目タイトル */
        .label {
            font-size: 2.2vw;
            font-weight: bold;
            color: #AAAAAA;
            white-space: nowrap;
        }
        .text-dark { color: #111111 !important; }
        .text-light { color: #AAAAAA !important; }

        /* 数値・顔文字表示エリア */
        .value-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            gap: 1vh;
        }
        .value-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            width: 100%;
        }
        .value {
            font-size: 7.5vw;
            line-height: 1;
        }
        .unit {
            font-size: 3vw;
            margin-left: 0.3vw;
        }

        /* 巨大顔文字 */
        .status-emoji {
            font-size: 6.5vw;
            line-height: 1;
            margin-top: 1vh;
            display: block;
        }

        /* 下部の日付・時刻エリア */
        .time-stamp {
            font-size: 1.5vw;
            color: #CCCCCC;
            background-color: #111111;
            padding: 0.6vh 0;
            border-radius: 4px;
            font-family: monospace;
            white-space: nowrap;
            width: 100%;
        }
        .time-dark {
            background-color: rgba(0,0,0,0.4) !important;
            color: #111111 !important;
        }

        /* ⑤ ロゴ専用エリア */
        #block-logo {
            justify-content: center;
            align-items: center;
            padding: 0;
            background-color: #000000 !important;
        }
        .logo-wrapper {
            width: 85%;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block data-block">
            <div class="label data-label">暑さ指数 (WBGT)</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-wbgt">――</span>
            </div>
            <div class="time-stamp data-time" id="time-wbgt">----/--/-- --:--:--</div>
        </div>

        <div class="block data-block">
            <div class="label data-label">気温</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-kion">――</span>
            </div>
            <div class="time-stamp data-time" id="time-kion">----/--/-- --:--:--</div>
        </div>

        <div class="block data-block">
            <div class="label data-label">黒球温度</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
                </div>
                <span class="status-emoji" id="emoji-koku">――</span>
            </div>
            <div class="time-stamp data-time" id="time-koku">----/--/-- --:--:--</div>
        </div>

        <div class="block data-block">
            <div class="label data-label">湿度</div>
            <div class="value-container">
                <div class="value-row">
                    <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
                </div>
                <span class="status-emoji" id="emoji-shitu">――</span>
            </div>
            <div class="time-stamp data-time" id="time-shitu">----/--/-- --:--:--</div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        const baseUrl = 'https://www2.edam.ne.jp/Json/WBGTNumData/2452';

        async function updateSignageData() {
            try {
                // 💡 【超強力対策】ミリ秒単位のタイムスタンプを生成し、URLの末尾に毎回違う数字を付与
                // さらに、プロキシ側（corsproxy.io）のキャッシュも強制的に破壊する構造に変更
                const timeStamp = new Date().getTime();
                const targetUrl = baseUrl + '?r=' + timeStamp;
                
                // プロキシURL自体にも一意の番号を付加して、プロキシサーバーのキャッシュも貫通させます
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl) + '&nocache=' + timeStamp;

                // 💡 fetchのオプションにキャッシュ無効化の設定を明示的に追加
                const response = await fetch(proxyUrl, {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                if (!response.ok) throw new Error('ネットワーク応答が正常ではありません');
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const current = data[0];
                    const wbgtVal = current.Wbgt ? Number(current.Wbgt) : 0;

                    // 数値セット
                    document.getElementById('val-wbgt').textContent = current.Wbgt ? wbgtVal.toFixed(1) : '--.-';
                    document.getElementById('val-kion').textContent = current.Kion ? Number(current.Kion).toFixed(1) : '--.-';
                    document.getElementById('val-koku').textContent = current.Koku ? Number(current.Koku).toFixed(1) : '--.-';
                    document.getElementById('val-shitu').textContent = current.Shitu ? Number(current.Shitu).toFixed(1) : '--.-';

                    // 時刻セット
                    const currentTimeString = current.Time || '----/--/-- --:--:--';
                    document.getElementById('time-wbgt').textContent = currentTimeString;
                    document.getElementById('time-kion').textContent = currentTimeString;
                    document.getElementById('time-koku').textContent = currentTimeString;
                    document.getElementById('time-shitu').textContent = currentTimeString;

                    // アラート定義
                    let bgColor = '#000000';
                    let textColor = '#FFFFFF';
                    let labelColorClass = 'text-light';
                    let timeColorClass = '';
                    let currentEmoji = '――';

                    if (current.Wbgt) {
                        if (wbgtVal >= 31.0) {
                            bgColor = '#880000';
                            currentEmoji = '😭';
                        } else if (wbgtVal >= 28.0) {
                            bgColor = '#A04000';
                            currentEmoji = '😫';
                        } else if (wbgtVal >= 25.0) {
                            bgColor = '#B39200';
                            textColor = '#000000';
                            labelColorClass = 'text-dark';
                            timeColorClass = 'time-dark';
                            currentEmoji = '😐';
                        } else {
                            bgColor = '#003366';
                            currentEmoji = '😊';
                        }
                    }

                    // 一斉適用
                    const blocks = document.querySelectorAll('.data-block');
                    const labels = document.querySelectorAll('.data-label');
                    const times = document.querySelectorAll('.data-time');
                    const emojis = document.querySelectorAll('.status-emoji');

                    blocks.forEach(b => {
                        b.style.backgroundColor = bgColor;
                        b.style.color = textColor;
                    });

                    labels.forEach(l => {
                        l.className = 'label data-label ' + labelColorClass;
                    });

                    times.forEach(t => {
                        if (timeColorClass) {
                            t.classList.add('time-dark');
                        } else {
                            t.classList.remove('time-dark');
                        }
                    });

                    emojis.forEach(e => {
                        e.textContent = currentEmoji;
                    });
                }
            } catch (error) {
                console.error('データ取得または解析エラー:', error);
            }
        }

        updateSignageData();
        setInterval(updateSignageData, 10000); 
    </script>
</body>
</html>
