<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBE SIGNAGE</title>
    <style>
        /* 💡 物理解像度 横640px × 縦128px を絶対維持 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Hiragino Kaku Gothic ProN', 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            width: 640px;
            height: 128px;
            user-select: none;
        }

        /* 全体コンテナ */
        .container {
            display: flex;
            width: 640px;
            height: 128px;
            overflow: hidden;
            position: relative;
        }

        /* 🔄 側面1〜4面（512px分）の表示ウインドウ */
        .sides-window {
            width: 512px;
            height: 128px;
            overflow: hidden;
            position: relative;
        }

        /* カルーセルトラック：カクつきを防ぐため、ハードウェアアクセラレーションを有効化 */
        .sides-track {
            display: flex;
            width: max-content;
            height: 128px;
            position: absolute;
            left: 0;
            top: 0;
            will-change: transform;
        }

        /* 📦 1面あたりの正方形サイズ (128px × 128px) */
        .pane {
            width: 128px;
            height: 128px;
            position: relative;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 4px;
            border-right: 1px solid rgba(0, 0, 0, 0.5);
        }

        /* 5面目：上面ロゴ（右端128pxに完全固定） */
        .logo-pane {
            width: 128px;
            height: 128px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            right: 0;
            top: 0;
            z-index: 10;
            padding: 4px;
        }
        .logo-pane img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 🎨 元写真のデザイン・文字フチ取り・レイアウトを100%完全再現 */
        .pane-title {
            font-size: 15px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000;
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }

        .value-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            height: 44px;
            margin-top: -2px;
        }
        .pane-value {
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            line-height: 1;
            letter-spacing: -1px;
        }
        .pane-unit {
            font-size: 16px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin-left: 2px;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin-top: 2px;
        }
        /* 元の「顔文字画像」のサイズと配置を死守 */
        .status-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .status-text {
            font-size: 16px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000, -1.5px 1.5px 0 #000, 1.5px 1.5px 0 #000;
            white-space: nowrap;
            letter-spacing: -0.5px;
        }

        /* 下段の黒帯時計（グラデーションとオレンジ枠線を再現） */
        .time-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 26px;
            background: linear-gradient(to bottom, #2b1903 0%, #110901 100%);
            border-top: 1px solid #ff9c1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .time-text {
            font-size: 18px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0px 0px 4px #ff9c00;
            letter-spacing: 0.5px;
        }

        /* 🎨 背景グラデーション（元の5色をそのまま維持） */
        .bg-safe      { background: linear-gradient(135deg, #005bac 0%, #003366 100%); }
        .bg-attention { background: linear-gradient(135deg, #3fa9f5 0%, #0071bc 100%); }
        .bg-warning   { background: linear-gradient(135deg, #fff200 0%, #d4c500 100%); }
        .bg-severe    { background: linear-gradient(135deg, #f7931e 0%, #d37200 100%); }
        .bg-danger    { background: linear-gradient(135deg, #f15a24 0%, #c1272d 100%); }
    </style>
</head>
<body>

    <div class="container">
        <!-- 🔄 側面1〜4面：無限シームレスウィンドウ -->
        <div class="sides-window">
            <div class="sides-track" id="sidesTrack"></div>
        </div>

        <!-- 📦 上面ロゴ：右端に常に固定（元仕様のまま） -->
        <div class="logo-pane">
            <img id="logoImg" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="LOGO">
        </div>
    </div>

    <script>
        // 🛠️ URLパラメータ処理（一切変更なし）
        const urlParams = new URLSearchParams(window.location.search);
        const corpID = urlParams.get('CorpID') || 'default';
        const loID = urlParams.get('LoID') || 'default';
        const ext = urlParams.get('Ext') || 'png';
        const testMode = urlParams.get('test');

        const jsonPath = `data/${corpID}/${loID}.json`;
        const logoPath = `logos/${corpID}/${loID}_logo.${ext}`;

        document.getElementById('logoImg').src = logoPath;

        // 側面4面のデータ構造定義
        const metrics = [
            { id: 'shitu', title: '現場湿度', unit: '%' },
            { id: 'wbgt', title: '暑さ指数', unit: '℃' },
            { id: 'kion', title: '現場気温', unit: '℃' },
            { id: 'koku', title: '黒球温度', unit: '℃' }
        ];

        // 🔔 警戒レベルの判定基準および「元コードの顔文字画像パス」を完全死守
        function getAlertConfig(wbgtValue) {
            const val = parseFloat(wbgtValue);
            if (val >= 32.1) {
                return { className: 'bg-danger', text: '危険', icon: 'faces/danger.png' };
            } else if (val >= 29.1) {
                return { className: 'bg-severe', text: '厳重警戒', icon: 'faces/severe.png' };
            } else if (val >= 26.1) {
                return { className: 'bg-warning', text: '警戒', icon: 'faces/warning.png' };
            } else if (val >= 22.1) {
                return { className: 'bg-attention', text: '注意', icon: 'faces/attention.png' };
            } else {
                return { className: 'bg-safe', text: 'ほぼ安全', icon: 'faces/safe.png' };
            }
        }

        const track = document.getElementById('sidesTrack');
        let currentStep = 0;
        const paneWidth = 128;
        const totalOriginalPanes = 4;

        // カルーセル構築：2回に1回カクつく巻き戻り現象を、前後の無限連結で完全に解消
        function buildCarousel(data, alertConfig) {
            track.innerHTML = '';
            
            // 無限周回用に【後方クローン2面】+【オリジナル4面】+【前方クローン4面】を連結
            const renderList = [
                metrics[2], metrics[3],  // クローン
                ...metrics,              // 本物
                ...metrics               // クローン
            ];

            renderList.forEach((metric) => {
                const pane = document.createElement('div');
                pane.className = `pane ${alertConfig.className}`;
                
                let value = data[metric.id] !== undefined ? data[metric.id] : '0.0';
                if (metric.id === 'shitu' && value.includes('.')) {
                    value = Math.round(parseFloat(value)).toString();
                }

                pane.innerHTML = `
                    <div class="pane-title">${metric.title}</div>
                    <div class="value-container">
                        <span class="pane-value">${value}</span>
                        <span class="pane-unit">${metric.unit}</span>
                    </div>
                    <div class="status-container">
                        <img class="status-icon" src="${alertConfig.icon}" alt="">
                        <span class="status-text">${alertConfig.text}</span>
                    </div>
                    <div class="time-banner">
                        <span class="time-text" data-time="true">00/00 00:00</span>
                    </div>
                `;
                track.appendChild(pane);
            });

            // 1面目「現場湿度」に初期座標を設定（前にクローンが2枚あるためインデックス2）
            currentStep = 2; 
            updateTrackPosition(false);
            updateTimestamps();
        }

        function updateTrackPosition(animate = true) {
            if (animate) {
                // 滑らかな動きのためにイージングを最適化
                track.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
            } else {
                track.style.transition = 'none';
            }
            track.style.transform = `translateX(${-currentStep * paneWidth}px)`;
        }

        // 5秒ごとのスライド処理：4面から1面への境目をシームレスに繋ぐ
        function nextSlide() {
            currentStep++;
            updateTrackPosition(true);

            // 4面（黒球温度）を通り過ぎて、前方クローンの先頭に達した瞬間
            if (currentStep === 2 + totalOriginalPanes) {
                // アニメーション完了（0.6秒）を待ってから、カクつきなしで本物の1面目に瞬時に座標を戻す
                setTimeout(() => {
                    currentStep = 2; 
                    updateTrackPosition(false);
                }, 600);
            }
        }

        // 下段時計の更新（MM/DD HH:mm）
        function updateTimestamps() {
            const now = new Date();
            const MM = String(now.getMonth() + 1).padStart(2, '0');
            const DD = String(now.getDate()).padStart(2, '0');
            const HH = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const timeStr = `${MM}/${DD} ${HH}:${mm}`;

            document.querySelectorAll('[data-time="true"]').forEach(el => {
                el.textContent = timeStr;
            });
        }

        // データ監視（10秒自動更新・従来通り）
        async function fetchLatestData() {
            try {
                let data = {};
                if (testMode) {
                    data = { wbgt: '29.2', kion: '30.1', koku: '35.8', shitu: '73' };
                    if (testMode === 'danger') data.wbgt = '32.5';
                    if (testMode === 'warning') data.wbgt = '26.5';
                    if (testMode === 'attention') data.wbgt = '23.0';
                    if (testMode === 'safe') data.wbgt = '20.0';
                } else {
                    const res = await fetch(`${jsonPath}?r=${new Date().getTime()}`);
                    if (!res.ok) throw new Error('Data fetch failed');
                    data = await res.json();
                }

                const alertConfig = getAlertConfig(data.wbgt);
                buildCarousel(data, alertConfig);

            } catch (error) {
                console.error('Data fetch error:', error);
                const alertConfig = getAlertConfig('0.0');
                buildCarousel({ wbgt: '0.0', kion: '0.0', koku: '0.0', shitu: '0' }, alertConfig);
            }
        }

        // 各種タイマー始動
        fetchLatestData();
        setInterval(fetchLatestData, 10000);
        setInterval(updateTimestamps, 10000);
        setInterval(nextSlide, 5000); // 5秒ごとに1面スライド
    </script>
</body>
</html>
