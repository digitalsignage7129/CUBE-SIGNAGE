<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境モニター サイネージ</title>
    <style>
        /* 画面全体の初期化 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        /* 5分割のコンテナ */
        .signage-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 各エリアの共通スタイル（均等5分割） */
        .block {
            flex: 1;
            height: 100%;
            border-right: 2px solid #222222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4vh 2vw;
            text-align: center;
        }
        .block:last-child {
            border-right: none;
        }

        /* 項目タイトル */
        .label {
            font-size: 2.2vw;
            font-weight: bold;
            color: #AAAAAA;
        }

        /* 数値表示エリア */
        .value-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .value {
            font-size: 7.5vw;
            line-height: 1;
        }
        .unit {
            font-size: 3.5vw;
            margin-left: 0.5vw;
        }

        /* 下部の日付・時刻エリア */
        .time-stamp {
            font-size: 1.6vw;
            color: #CCCCCC;
            background-color: #111111;
            padding: 0.6vh 0;
            border-radius: 4px;
            font-family: monospace;
        }

        /* ① WBGT専用ブロック（背景色変化） */
        #block-wbgt {
            background-color: #000000; 
            transition: background-color 0.5s ease;
        }

        /* ⑤ ロゴ専用エリア */
        #block-logo {
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        .logo-wrapper {
            width: 85%;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="signage-container">
        <div class="block" id="block-wbgt">
            <div class="label">暑さ指数 (WBGT)</div>
            <div class="value-container">
                <span class="value" id="val-wbgt">--.-</span><span class="unit">℃</span>
            </div>
            <div class="time-stamp" id="time-wbgt">----/--/-- --:--:--</div>
        </div>

        <div class="block">
            <div class="label">気温</div>
            <div class="value-container">
                <span class="value" id="val-kion">--.-</span><span class="unit">℃</span>
            </div>
            <div class="time-stamp" id="time-kion">----/--/-- --:--:--</div>
        </div>

        <div class="block">
            <div class="label">黒球温度</div>
            <div class="value-container">
                <span class="value" id="val-koku">--.-</span><span class="unit">℃</span>
            </div>
            <div class="time-stamp" id="time-koku">----/--/-- --:--:--</div>
        </div>

        <div class="block">
            <div class="label">湿度</div>
            <div class="value-container">
                <span class="value" id="val-shitu">--.-</span><span class="unit">%</span>
            </div>
            <div class="time-stamp" id="time-shitu">----/--/-- --:--:--</div>
        </div>

        <div class="block" id="block-logo">
            <div class="logo-wrapper">
                <img src="logo.png" alt="ロゴ">
            </div>
        </div>
    </div>

    <script>
        // 確実に取得できることがログで確認できた「人間用の元URL」に戻します
        const targetUrl = 'https://www2.edam.ne.jp/Public/00574/Sokutei/WBGT?LoID=2452'; 
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

        async function updateSignageData() {
            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('ネットワーク応答が正常ではありません');
                
                const resText = await response.text();
                
                // 【超究極パース】
                // JSONキーワード（TimeやWbgt）に依存せず、HTMLソース内の「中括弧 { } で囲まれた塊」をすべて全スキャンして、
                // 中にデータ（WbgtやTime、数字など）が入っている部分を力づくでこじ開けて解析します。
                const braceMatches = resText.match(/\{[^{}]*?\}/g);
                if (!braceMatches) throw new Error('ソース内からデータブロックが検出できませんでした');

                let parsedData = null;

                for (let block of braceMatches) {
                    // 焼き付き対策も含め、大文字小文字を問わずキーが含まれているかチェック
                    if (block.toLowerCase().includes('wbgt') || block.toLowerCase().includes('time')) {
                        try {
                            // もし前後に余計な文字がくっついていたらトリムしてパースを試みる
                            const cleanBlock = block.trim();
                            const obj = JSON.parse(cleanBlock);
                            // 必要なプロパティが1つでもあれば採用
                            if (obj.Wbgt || obj.Kion || obj.Time) {
                                parsedData = obj;
                                break;
                            }
                        } catch(e) {
                            // パース失敗した単なるJSコードのブロックはスルーして次を探す
                            continue;
                        }
                    }
                }

                // 2段目の防衛策：もし配列型の中に直接埋め込まれていた場合 `[{...}]`
                if (!parsedData) {
                    const arrayMatch = resText.match(/\[\s*\{[\s\S]*?\}\s*\]/);
                    if (arrayMatch) {
                        try {
                            const arr = JSON.parse(arrayMatch[0]);
                            if (arr && arr.length > 0) parsedData = arr[0];
                        } catch(e) {}
                    }
                }

                // それでもダメなら例外を投げる
                if (!parsedData) throw new Error('有効な環境データオブジェクトを抽出できませんでした');

                // --- 画面へのデータ反映処理 ---
                document.getElementById('val-wbgt').textContent = parsedData.Wbgt ? Number(parsedData.Wbgt).toFixed(1) : '--.-';
                document.getElementById('val-kion').textContent = parsedData.Kion ? Number(parsedData.Kion).toFixed(1) : '--.-';
                document.getElementById('val-koku').textContent = parsedData.Koku ? Number(parsedData.Koku).toFixed(1) : '--.-';
                document.getElementById('val-shitu').textContent = parsedData.Shitu ? Number(parsedData.Shitu).toFixed(1) : '--.-';

                const currentTimeString = parsedData.Time || '----/--/-- --:--:--';
                document.getElementById('time-wbgt').textContent = currentTimeString;
                document.getElementById('time-kion').textContent = currentTimeString;
                document.getElementById('time-koku').textContent = currentTimeString;
                document.getElementById('time-shitu').textContent = currentTimeString;

                // 背景アラート色
                const wbgtBlock = document.getElementById('block-wbgt');
                const wbgtVal = Number(parsedData.Wbgt);
                if (wbgtVal >= 31.0) {
                    wbgtBlock.style.backgroundColor = '#660000';
                } else if (wbgtVal >= 28.0) {
                    wbgtBlock.style.backgroundColor = '#553300';
                } else {
                    wbgtBlock.style.backgroundColor = '#000000';
                }

            } catch (error) {
                console.error('データ取得または解析エラー:', error);
            }
        }

        // 即時実行と10秒自動ループ
        updateSignageData();
        setInterval(updateSignageData, 10000); 
    </script>
</body>
</html>
