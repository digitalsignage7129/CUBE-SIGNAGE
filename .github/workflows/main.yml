name: Auto Fetch All Sites

on:
  schedule:
    - cron: '*/10 * * * *' # 10分ごとに定期実行
  workflow_dispatch: # 管理画面からの即時命令受け取り

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.ref || 'main' }}

      - name: Process each site from text file
        run: |
          if [ ! -s sites.txt ]; then
            echo "sites.txt is empty or does not exist. Skipping."
            exit 0
          fi
          
          cat sites.txt | while IFS=, read -r corp_id lo_id || [ -n "$corp_id" ]; do
            corp_id=$(echo "$corp_id" | tr -d '\r\n\t ')
            lo_id=$(echo "$lo_id" | tr -d '\r\n\t ')
            [[ -z "$corp_id" || "$corp_id" =~ ^# ]] && continue
            
            echo "============================================="
            echo "Processing CorpID: [${corp_id}], LoID: [${lo_id}]"
            mkdir -p "data/$corp_id"

            # キャッシュを回避するためのタイムスタンプを生成
            TIMESTAMP=$(date +%s)

            # 🎯 突き止めた最新の正しいURL構造でデータを取得
            DATA_JSON=$(curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://www2.edam.ne.jp/Json/WBGTNumData/${lo_id}?r=${TIMESTAMP}")
            
            # 🎯 [ { ... } ] の形（配列）で届くため、先頭の1件目 [0] を狙い撃ちして抽出するようにjqを大改造
            WBGT=$(echo "$DATA_JSON" | jq -r '.[0].Wbgt // "0.0"' 2>/dev/null || echo "0.0")
            KION=$(echo "$DATA_JSON" | jq -r '.[0].Kion // "0.0"' 2>/dev/null || echo "0.0")
            KOKU=$(echo "$DATA_JSON" | jq -r '.[0].Koku // "0.0"' 2>/dev/null || echo "0.0")
            SHITU=$(echo "$DATA_JSON" | jq -r '.[0].Shitu // "0"' 2>/dev/null || echo "0")

            # 万が一のnullや空文字のディフェンス
            if [[ -z "$WBGT" || "$WBGT" == "null" ]]; then WBGT="0.0"; fi
            if [[ -z "$KION" || "$KION" == "null" ]]; then KION="0.0"; fi
            if [[ -z "$KOKU" || "$KOKU" == "null" ]]; then KOKU="0.0"; fi
            if [[ -z "$SHITU" || "$SHITU" == "null" ]]; then SHITU="0"; fi

            # awkを使った安全な数値比較
            LEVEL="safe"
            if (( $(echo "$WBGT 31.0" | awk '{print ($1 >= $2)}') )); then LEVEL="danger";
            elif (( $(echo "$WBGT 28.0" | awk '{print ($1 >= $2)}') )); then LEVEL="severe";
            elif (( $(echo "$WBGT 25.0" | awk '{print ($1 >= $2)}') )); then LEVEL="warning";
            elif (( $(echo "$WBGT 21.0" | awk '{print ($1 >= $2)}') )); then LEVEL="attention"; fi

            # 最終的なJSONファイルを保存（サイネージ側の index.html が読み込む形）
            echo "{\"wbgt\":\"$WBGT\",\"kion\":\"$KION\",\"koku\":\"$KOKU\",\"shitu\":\"$SHITU\",\"level\":\"$LEVEL\"}" > "data/${corp_id}/${lo_id}.json"
            echo "👉 Successfully generated data/${corp_id}/${lo_id}.json (WBGT: $WBGT, Kion: $KION)"

          done
          exit 0

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --cached --quiet || git commit -m "Update latest environmental data [skip ci]"
          git push
