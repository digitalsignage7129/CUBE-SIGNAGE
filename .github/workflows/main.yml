name: Auto Fetch All Sites

on:
  schedule:
    - cron: '*/10 * * * *' # 10分ごとに定期実行
  workflow_dispatch: # 管理画面からの即時命令受け取り

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.ref || 'main' }}

      - name: Process each site from text file
        run: |
          touch sites.txt
          
          while IFS=, read -r corp_id lo_id || [ -n "$corp_id" ]; do
            [[ -z "$corp_id" || "$corp_id" =~ ^# ]] && continue
            
            echo "Fetching data for CorpID: $corp_id, LoID: $lo_id"
            mkdir -p "data/$corp_id"

            # EDAMから生データを取得
            DATA_JSON=$(curl -sL "https://www2.edam.ne.jp/Public/${corp_id}/Sokutei/GetLatestData?LoID=${lo_id}")
            
            # データが抜けていた場合のデフォルト値を設定
            WBGT=$(echo "$DATA_JSON" | jq -r '.Wbgt // "0.0"')
            KION=$(echo "$DATA_JSON" | jq -r '.Kion // "0.0"')
            KOKU=$(echo "$DATA_JSON" | jq -r '.Koku // "0.0"')
            SHITU=$(echo "$DATA_JSON" | jq -r '.Shitu // "0"')

            # 数字が正常に取れず空文字や「null」になった場合の安全ガード
            if [[ -z "$WBGT" || "$WBGT" == "null" ]]; then WBGT="0.0"; fi
            if [[ -z "$KION" || "$KION" == "null" ]]; then KION="0.0"; fi
            if [[ -z "$KOKU" || "$KOKU" == "null" ]]; then KOKU="0.0"; fi
            if [[ -z "$SHITU" || "$SHITU" == "null" ]]; then SHITU="0"; fi

            # 🎯 awkを使ってエラー（Exit code 5）を絶対に回避する安全な数値比較
            LEVEL="safe"
            if (( $(echo "$WBGT 31.0" | awk '{print ($1 >= $2)}') )); then LEVEL="danger";
            elif (( $(echo "$WBGT 28.0" | awk '{print ($1 >= $2)}') )); then LEVEL="severe";
            elif (( $(echo "$WBGT 25.0" | awk '{print ($1 >= $2)}') )); then LEVEL="warning";
            elif (( $(echo "$WBGT 21.0" | awk '{print ($1 >= $2)}') )); then LEVEL="attention"; fi

            # JSONファイルを生成
            echo "{\"wbgt\":\"$WBGT\",\"kion\":\"$KION\",\"koku\":\"$KOKU\",\"shitu\":\"$SHITU\",\"level\":\"$LEVEL\"}" > "data/${corp_id}/${lo_id}.json"
            echo "Successfully generated: data/${corp_id}/${lo_id}.json (WBGT: $WBGT)"

          done < sites.txt

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --cached --quiet || git commit -m "Update latest environmental data [skip ci]"
          git push
