name: 現場環境データ定期更新

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # 画面上の設定に依存せず、このワークフロー単体に強力な書き込み権限を明示的に付与します
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    - name: Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 依存ライブラリのインストール
      run: |
        pip install requests beautifulsoup4

    - name: データ取得スクリプトの実行
      run: python update_data.py

    - name: 変更があった場合に自動コミット＆プッシュ
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.json
        # 変更の有無をチェックし、あればプッシュ
        git diff --cached --quiet || (git commit -m "データ自動更新" && git push)
